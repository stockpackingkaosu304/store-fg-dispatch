   EVENT DELEGATION (จัดการคลิกและพิมพ์ในแถว)
============================================================= */
var container = document.getElementById("itemsContainer");

// 1. ดักจับการพิมพ์ค้นหา (Smart Auto-Complete)
container.addEventListener("input", function(e) {
    if (e.target.classList.contains("item-search")) {
        let input = e.target;
        let val = input.value.trim().toUpperCase();
        let row = input.closest(".item-row");
        let box = row.querySelector(".suggestions-box");
        let hiddenInput = row.querySelector(".real-item-code");
        let nameInput = row.querySelector(".part-name");

        // ถ้ายูสเซอร์ลบข้อความ ให้รีเซ็ตค่าที่ซ่อนไว้ด้วย
        hiddenInput.value = "";
        nameInput.value = "";
        input.classList.remove('bg-green-50', 'border-green-400', 'text-green-800');

        if (val.length < 2) {
            box.style.display = "none";
            return;
        }

        // กรองข้อมูลจาก masterDataList
        let matches = masterDataList.filter(item => 
            item.item_code.toUpperCase().includes(val) || 
            (item.code_name && item.code_name.toUpperCase().includes(val)) ||
            (item.cl && item.cl.toUpperCase().includes(val))
        ).slice(0, 10); // เอาแค่ 10 รายการเพื่อไม่ให้ล้นจอ

        if (matches.length > 0) {
            box.innerHTML = matches.map(item => `
                <div class="suggestion-item flex flex-col" data-code="${item.item_code}" data-name="${item.code_name}" data-cl="${item.cl}" data-pack="${item.pack_type}">
                    <span class="text-sm font-bold text-slate-800">${item.item_code}</span>
                    <span class="text-[10px] text-slate-500">ลูกค้า: ${item.cl} | ${item.code_name}</span>
                </div>
            `).join("");
            box.style.display = "block";
        } else {
            box.innerHTML = `<div class="p-3 text-xs text-red-500 text-center">ไม่พบสินค้าในระบบ</div>`;
            box.style.display = "block";
        }
    }

    // 2. คำนวณยอดรวม (Bag * Pack + Fraction)
    if (e.target.classList.contains("bag-qty") || e.target.classList.contains("pack-qty") || e.target.classList.contains("fraction-qty")) {
        let row = e.target.closest(".item-row");
        let bags = parseFloat(row.querySelector(".bag-qty").value) || 0;
        let pack = parseFloat(row.querySelector(".pack-qty").value) || 0;
        let frac = parseFloat(row.querySelector(".fraction-qty").value) || 0;
        row.querySelector(".total-qty").value = (bags * pack) + frac;
    }
});

// ดักจับการจิ้มเลือกสินค้าจากกล่อง Auto-Complete
container.addEventListener("click", function(e) {
    let suggestion = e.target.closest(".suggestion-item");
    if (suggestion) {
        let row = suggestion.closest(".item-row");
        let code = suggestion.getAttribute("data-code");
        let name = suggestion.getAttribute("data-name");
        let cl = suggestion.getAttribute("data-cl");
        let pack = suggestion.getAttribute("data-pack") || "";

        // เติมข้อมูลลงช่อง
        let searchInput = row.querySelector(".item-search");
        searchInput.value = code;
        searchInput.classList.add('bg-green-50', 'border-green-400', 'text-green-800'); // เปลี่ยนสีช่องให้รู้ว่าเลือกระบบแล้ว
        row.querySelector(".real-item-code").value = code;
        row.querySelector(".part-name").value = `ลูกค้า: ${cl} | ${name}`;
        
        // เติมจำนวนบรรจุให้อัตโนมัติ (ถ้ามี)
        let packInput = row.querySelector(".pack-qty");
        if(packInput.value === "") packInput.value = pack.replace(/[^0-9]/g, '');

        row.querySelector(".suggestions-box").style.display = "none";
    }

    // จัดการปุ่มลบแถว
    let btn = e.target.closest("[data-action]");
    if (btn && btn.getAttribute("data-action") === "remove-row") {
        if (document.querySelectorAll(".item-row").length > 1) {
            deletePendingFiles(btn.closest(".item-row").getAttribute("data-row-uid"));
            btn.closest(".item-row").remove();
            updateRowNumbers();
        } else {
            alert("ต้องมีรายการอย่างน้อย 1 แถว");
        }
    }
    
    // ถ่ายรูป
    if (btn && btn.getAttribute("data-action") === "take-photo") {
        activePhotoRow = btn.closest(".item-row");
        let cam = document.getElementById("globalCameraInput");
        cam.value = "";
        cam.click();
    }
});

function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(event) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            var MAX_WIDTH = 1024, MAX_HEIGHT = 1024;
            var width = img.width, height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
                callback(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.7);
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById("globalCameraInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file || !activePhotoRow) return;
    var uid = activePhotoRow.getAttribute("data-row-uid");
    var capturedRow = activePhotoRow;
    activePhotoRow = null;

    compressImage(file, function(compressedFile) {
        if (!pendingFiles[uid]) pendingFiles[uid] = [];
        pendingFiles[uid].push(compressedFile);
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = document.createElement("img");
            img.src = ev.target.result;
            img.className = "photo-thumb";
            capturedRow.querySelector(".photo-strip").appendChild(img);
        };
        reader.readAsDataURL(compressedFile);
    });
});

async function uploadPhotos(uid, files, txnId) {
    if (!files.length) return { urls: [], failed: [] };
    var tasks = files.map(function(file, i) {
        var path = txnId + "/" + uid + "_" + i + ".jpg";
        return sbClient.storage.from("dispatch-photos").upload(path, file, { upsert: true }).then(r => {
            if (r.error) return { ok: false, name: file.name };
            return { ok: true, url: sbClient.storage.from("dispatch-photos").getPublicUrl(path).data.publicUrl };
        }).catch(() => ({ ok: false, name: file.name }));
    });
    var results = await Promise.all(tasks);
    return {
        urls: results.filter(r => r.ok).map(r => r.url),
        failed: results.filter(r => !r.ok).map(r => r.name)
    };
}

/* =============================================================
   SUBMIT FORM
============================================================= */
document.getElementById("dispatchForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    if (!sbClient) { alert("❌ ระบบฐานข้อมูลไม่พร้อมใช้งาน"); return; }

    // ตรวจสอบ Validation ว่าเลือกรหัสสินค้าจากระบบจริงๆ หรือยังพิมพ์มั่วอยู่
    let allValid = true;
    let rows = document.querySelectorAll(".item-row");
    rows.forEach(row => {
        if (row.querySelector(".real-item-code").value === "") {
            row.querySelector(".item-search").classList.add("border-red-500", "ring-2", "ring-red-500");
            allValid = false;
        }
    });

    if(!allValid) {
        alert("⚠️ กรุณาจิ้มเลือกรายการสินค้าจากตัวเลือกที่ระบบค้นหาให้เท่านั้น ห้ามพิมพ์เองมั่วๆ ครับ!");
        return;
    }

    var btn = document.getElementById("submitBtn");
    var textEl = document.getElementById("submitText");
    var iconEl = document.getElementById("submitIcon");
    var origTxt = textEl.textContent;

    textEl.textContent = "กำลังบันทึก...";
    iconEl.className = "fa-solid fa-spinner fa-spin mr-2";
    btn.disabled = true;

    try {
        var now = new Date();
        var pad = n => ("0" + n).slice(-2);
        var txnId = "TXN-" + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + "-" + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

        var shiftText = document.getElementById("shift").value === "A" ? "Shift A" : "Shift B";
        var staffId = document.getElementById("staffId").value.trim().toUpperCase();

        textEl.textContent = "กำลังอัปโหลดรูป...";
        var uploadTasks = Array.from(rows).map(row => {
            var uid = row.getAttribute("data-row-uid");
            return uploadPhotos(uid, getPendingFiles(uid), txnId).then(res => ({ uid, urls: res.urls }));
        });
        var uploadResults = await Promise.all(uploadTasks);
        var photoUrlsMap = {};
        uploadResults.forEach(res => photoUrlsMap[res.uid] = res.urls);

        textEl.textContent = "กำลังบันทึกข้อมูล...";
        var r1 = await sbClient.from("bills").insert([{ bill_id: txnId, shift: shiftText, staff_id: staffId }]);
        if (r1.error) throw new Error("bills: " + r1.error.message);

        var items = [];
        rows.forEach(row => {
            var uid = row.getAttribute("data-row-uid");
            var itemCode = row.querySelector(".real-item-code").value; // ดึงรหัสที่แท้จริง
            var name = row.querySelector(".part-name").value; // ดึงชื่อ
            var bag = Number(row.querySelector(".bag-qty").value) || 0;
            var pack = Number(row.querySelector(".pack-qty").value) || 0;
            var frac = Number(row.querySelector(".fraction-qty").value) || 0;
            
            items.push({
                bill_id: txnId,
                part_name: `${itemCode} (${name})`, // ฟอร์แมตใหม่: ITEM CODE (ลูกค้า | ชื่อ)
                bag_qty: bag,
                pack_qty: pack,
                fraction_qty: frac,
                photo_urls: photoUrlsMap[uid] || []
            });
        });

        var r2 = await sbClient.from("bill_items").insert(items);
        if (r2.error) throw new Error("bill_items: " + r2.error.message);

        alert("✅ บันทึกสำเร็จ!\nรหัสอ้างอิง: " + txnId);

        /* Reset form */
        clearAllPendingFiles();
        document.getElementById("itemsContainer").innerHTML = "";
        createRow();
        document.getElementById("shift").value = "A";

    } catch(err) {
        alert("❌ " + err.message);
        console.error(err);
    } finally {
        textEl.textContent = origTxt;
        iconEl.className = "fa-solid fa-paper-plane mr-2";
        btn.disabled = false;
    }
});
