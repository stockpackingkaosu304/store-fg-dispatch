function changeLanguage(lang) {
    var t = translations[lang];
    if (!t) return;
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
        var key = el.getAttribute("data-i18n");
        if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
        var key = el.getAttribute("data-i18n-placeholder");
        if (t[key] !== undefined) el.setAttribute("placeholder", t[key]);
    });
}

            '<span class="text-gray-400 font-bold">-</span>',

function updateRowNumbers() {
    document.querySelectorAll(".item-row").forEach(function(row, i) {
        row.querySelector(".row-number").textContent = "Item #" + (i + 1);
    });
}

/* =============================================================
   PENDING FILES STORE (Updated with compression)
============================================================= */
var pendingFiles = {};

function getPendingFiles(uid)    { return pendingFiles[uid] || []; }
function deletePendingFiles(uid) { delete pendingFiles[uid]; }
function clearAllPendingFiles()  { pendingFiles = {}; }

// ฟังก์ชันบีบอัดรูปภาพ
function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(event) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            var MAX_WIDTH = 1024, MAX_HEIGHT = 1024;
            var width = img.width, height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(function(blob) {
                var newFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });
                callback(newFile);
            }, 'image/jpeg', 0.7);
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

/* =============================================================
   EVENT DELEGATION
============================================================= */
var container = document.getElementById("itemsContainer");
var activePhotoRow = null;

container.addEventListener("input", function(e) {
    var t = e.target;
    if (!t.classList.contains("bag-qty") && !t.classList.contains("pack-qty") && !t.classList.contains("fraction-qty")) return;

    var row  = t.closest(".item-row");
    var bags = parseFloat(row.querySelector(".bag-qty").value)      || 0;
    var pack = parseFloat(row.querySelector(".pack-qty").value)     || 0;
    var frac = parseFloat(row.querySelector(".fraction-qty").value) || 0;
    row.querySelector(".total-qty").value = (bags * pack) + frac;
});

container.addEventListener("click", function(e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var row    = btn.closest(".item-row");
    var action = btn.getAttribute("data-action");

    if (action === "remove-row") {
        if (document.querySelectorAll(".item-row").length > 1) {
            var uid = row.getAttribute("data-row-uid");
            deletePendingFiles(uid);
            row.remove();
            updateRowNumbers();
        } else {
            alert("ต้องมีรายการอย่างน้อย 1 แถว");
        }
        return;
    }

    if (action === "take-photo") {
        activePhotoRow = row;
        var cam = document.getElementById("globalCameraInput");
        cam.value = ""; 
        cam.click();
    }
});

/* รับภาพจากกล้อง → บีบอัดรูป → เก็บ File + แสดง thumbnail */
document.getElementById("globalCameraInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file || !activePhotoRow) return;

    var uid = activePhotoRow.getAttribute("data-row-uid");
    var capturedRow = activePhotoRow; 
    activePhotoRow = null;

    compressImage(file, function(compressedFile) {
        if (!pendingFiles[uid]) pendingFiles[uid] = [];
        pendingFiles[uid].push(compressedFile);

        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = document.createElement("img");
            img.src       = ev.target.result;
            img.className = "photo-thumb";
            img.title     = (compressedFile.size / 1024).toFixed(1) + " KB";
            capturedRow.querySelector(".photo-strip").appendChild(img);
        };
        reader.readAsDataURL(compressedFile);
    });
});

/* =============================================================
   UPLOAD PHOTOS
============================================================= */
async function uploadPhotos(uid, files, txnId) {
    if (!files.length) return { urls: [], failed: [] };

    var tasks = files.map(function(file, i) {
        var ext  = file.name.split(".").pop() || "jpg";
        var path = txnId + "/" + uid + "_" + i + "." + ext;
        
        console.log("เริ่มอัปโหลด:", path); // ดูว่าชื่อไฟล์เป็นอะไร

        return sbClient.storage
            .from("dispatch-photos")
            .upload(path, file, { upsert: true })
            .then(function(r) {
                if (r.error) {
                    console.error("❌ อัปโหลดไฟล์ไม่สำเร็จ [" + file.name + "]:", r.error);
                    return { ok: false, name: file.name };
                }
                var pub = sbClient.storage.from("dispatch-photos").getPublicUrl(path);
                console.log("✅ อัปโหลดสำเร็จ:", pub.data.publicUrl);
                return { ok: true, url: pub.data.publicUrl };
            })
            .catch(function(err) {
                console.error("❌ เกิด Error รุนแรงตอนอัปโหลด:", err);
                return { ok: false, name: file.name };
            });
    });

    var results = await Promise.all(tasks);
    var urls   = results.filter(function(r) { return r.ok;  }).map(function(r) { return r.url; });
    var failed = results.filter(function(r) { return !r.ok; }).map(function(r) { return r.name; });
    return { urls: urls, failed: failed };
}

/* =============================================================
   SUBMIT
============================================================= */
document.getElementById("dispatchForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    if (!sbClient) { alert("❌ ระบบฐานข้อมูลไม่พร้อมใช้งาน"); return; }

    var btn     = document.getElementById("submitBtn");
    var textEl  = document.getElementById("submitText");
    var iconEl  = document.getElementById("submitIcon");
    var origTxt = textEl.textContent;

    textEl.textContent = "กำลังบันทึก...";
    iconEl.className   = "fa-solid fa-spinner fa-spin mr-2";
    btn.disabled       = true;

    try {
        var now = new Date();
        var pad = function(n) { return ("0" + n).slice(-2); };
        var txnId = "TXN-" +
            now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) +
            "-" + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

        var shiftText = document.getElementById("shift").value === "A" ? "Shift A" : "Shift B";
        var rows      = document.querySelectorAll(".item-row");

        textEl.textContent = "กำลังบีบอัดและอัปโหลดรูป...";

        var uploadTasks = Array.from(rows).map(function(row) {
            var uid   = row.getAttribute("data-row-uid");
            var files = getPendingFiles(uid);
            return uploadPhotos(uid, files, txnId).then(function(result) {
                return { uid: uid, urls: result.urls, failed: result.failed };
            });
        });

        var uploadResults = await Promise.all(uploadTasks);
        var allFailed = [];
        var photoUrlsMap = {};
        
        uploadResults.forEach(function(res) {
            photoUrlsMap[res.uid] = res.urls;
            res.failed.forEach(function(name) { allFailed.push(name); });
        });

        if (allFailed.length > 0) {
            var proceed = confirm(
                "⚠️ รูปต่อไปนี้อัปโหลดไม่สำเร็จ:\n" + allFailed.join("\n") +
                "\n\nต้องการบันทึกข้อมูลโดยไม่มีรูปเหล่านั้นหรือไม่?"
            );
            if (!proceed) throw new Error("ยกเลิกโดยผู้ใช้");
        }

        textEl.textContent = "กำลังบันทึกข้อมูล...";
        var r1 = await sbClient.from("bills").insert([{ bill_id: txnId, shift: shiftText }]);
        if (r1.error) throw new Error("bills: " + r1.error.message);

        var items = [];
        rows.forEach(function(row) {
            var uid  = row.getAttribute("data-row-uid");
            var cat  = row.querySelector(".item-category").value;
            var cust = row.querySelector(".item-customer").value;
            var no   = row.querySelector(".item-number").value;
            var name = row.querySelector(".part-name").value;
            var bag  = Number(row.querySelector(".bag-qty").value)      || 0;
            var pack = Number(row.querySelector(".pack-qty").value)     || 0;
            var frac = Number(row.querySelector(".fraction-qty").value) || 0;

            items.push({
                bill_id:      txnId,
                part_name:    cat + "-L" + cust + "-" + no + " (" + name + ")",
                bag_qty:      bag,
                pack_qty:     pack,
                fraction_qty: frac,
                photo_urls:   photoUrlsMap[uid] || [] 
            });
        });

        var r2 = await sbClient.from("bill_items").insert(items);
        if (r2.error) throw new Error("bill_items: " + r2.error.message);

        alert("✅ บันทึกสำเร็จ!\nรหัสอ้างอิง: " + txnId);

        clearAllPendingFiles();
        document.getElementById("itemsContainer").innerHTML = "";
        createRow();
        document.getElementById("shift").value = "A";

    } catch(err) {
        if (err.message !== "ยกเลิกโดยผู้ใช้") {
            alert("❌ " + err.message);
        }
        console.error(err);
    } finally {
        textEl.textContent = origTxt;
        iconEl.className   = "fa-solid fa-paper-plane mr-2";
        btn.disabled       = false;
    }
});

/* =============================================================
   INIT
============================================================= */
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("btnAddRow").addEventListener("click", createRow);

    document.getElementById("langSwitcher").addEventListener("change", function() {
        changeLanguage(this.value);
    });

    createRow();
    changeLanguage(document.getElementById("langSwitcher").value);
});
</script>
