<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Store FG - Dispatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 Theme Engine Variables */
        :root {
            --bg-gradient: linear-gradient(-45deg, #f8fafc, #e2e8f0, #cbd5e1, #f1f5f9);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --card-hover: rgba(255, 255, 255, 0.9);
            --glow-color: rgba(14, 165, 233, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0f172a);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --card-hover: rgba(51, 65, 85, 0.8);
            --glow-color: rgba(56, 189, 248, 0.15);
        }

        [data-theme="kaosu"] {
            --bg-gradient: linear-gradient(-45deg, #450a0a, #7f1d1d, #220303, #450a0a);
            --glass-bg: rgba(69, 10, 10, 0.6);
            --glass-border: rgba(250, 204, 21, 0.2);
            --input-bg: rgba(0, 0, 0, 0.2);
            --text-main: #fef08a; 
            --text-sub: #fca5a5;
            --card-hover: rgba(127, 29, 29, 0.8);
            --glow-color: rgba(250, 204, 21, 0.15);
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.5s ease;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .photo-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; border: 1px solid var(--glass-border); cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .photo-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

        /* Glassmorphism Styles */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .glass-input {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .glass-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        
        .mouse-glow {
            position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%);
            width: 600px; height: 600px; background: radial-gradient(circle, var(--glow-color) 0%, transparent 60%);
            pointer-events: none; z-index: 0; transition: width 0.2s, height 0.2s;
        }

        .suggestions-box {
            position: absolute; z-index: 50; width: 100%; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 0.75rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            max-height: 220px; overflow-y: auto; display: none; top: 100%; left: 0; margin-top: 8px;
        }
        .suggestion-item { padding: 10px 14px; border-bottom: 1px solid var(--glass-border); cursor: pointer; transition: background 0.2s; }
        .suggestion-item:hover { background: var(--card-hover); }
        .suggestion-item:last-child { border-bottom: none; }
    </style>
</head>

<script>
/* =============================================================

============================================================= */
const savedTheme = localStorage.getItem('wms_theme') || 'dark';
document.body.setAttribute('data-theme', savedTheme);

document.addEventListener('mousemove', (e) => {
    document.documentElement.style.setProperty('--x', e.clientX + 'px');

});
document.addEventListener('touchmove', (e) => {

    zh: {

    },

        shift: "SHIFT", staffId: "STAFF ID", staffIdPh: "EMP001",
        itemList: "DISPATCH ITEMS", partNamePh: "Auto-fill part name", searchPh: "Search ITEM (e.g. 088)",
        bag: "Bag", pack: "Pack", fraction: "Frac.", total: "TOTAL", btnAdd: "Add Item", btnSubmit: "SUBMIT DATA", takePhoto: "Take Photo"
    }
};

let currentLang = localStorage.getItem('wms_lang') || 'th';
function t(key) { return translations[currentLang][key] || translations['th'][key]; }

function changeLanguage(lang) {
    if (!translations[lang]) return;
    currentLang = lang;
    localStorage.setItem('wms_lang', lang);
    document.querySelectorAll('#globalLangSwitcher').forEach(s => s.value = lang);
    const trans = translations[lang];
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (trans[key] !== undefined) el.textContent = trans[key];
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-i18n-placeholder");
        if (trans[key] !== undefined) el.setAttribute("placeholder", trans[key]);
    });
}

// ==========================================
// 🚀 ฐานข้อมูล และ Smart Search Logic
// ==========================================
const SB_URL = "https://suardrnsfpdqwcgupqkb.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YXJkcm5zZnBkcXdjZ3VwcWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTY1NjAsImV4cCI6MjA5ODAzMjU2MH0.-ooHJb_YXCpNgxkiGRlt6M1-A1iPTJFNYlPLFsfOzQI";
const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

let masterDataList = []; 

async function fetchMasterData() {
    try {
        const { data, error } = await sbClient.from("part_master").select("*");
        if (error) throw error;
        masterDataList = data;
        
        let loader = document.getElementById('masterLoading');
        loader.classList.add('opacity-0');
        setTimeout(() => loader.classList.add('hidden'), 300);
    } catch(err) {
        alert("โหลดฐานข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ");
        console.error(err);
    }
}

var uidCounter = 0;
function makeUID() { return "r" + (++uidCounter); }

function createRow() {
    var uid = makeUID();
    var div = document.createElement("div");
    div.className = "item-row glass-input p-4 rounded-2xl relative pt-8 shadow-md border-[var(--glass-border)]";
    div.setAttribute("data-row-uid", uid);

    div.innerHTML = `
        <div class="absolute top-0 left-0 right-0 bg-black/10 px-3 py-1.5 rounded-t-2xl flex justify-between items-center border-b border-[var(--glass-border)]">
            <span class="text-[10px] font-black text-[var(--text-sub)] uppercase tracking-widest row-number"></span>
            <button type="button" data-action="remove-row" class="text-[var(--text-sub)] hover:text-red-400 transition-colors"><i class="fa-solid fa-xmark text-sm"></i></button>
        </div>

        <!-- 🔍 ช่อง Smart Search -->
        <div class="mb-3 mt-1 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-sky-400"></i>
            <input type="text" class="item-search w-full glass-input rounded-xl p-3 pl-11 text-sm font-bold focus:ring-2 focus:ring-sky-500 outline-none" data-i18n-placeholder="searchPh" placeholder="ค้นหารหัส ITEM (เช่น 088)" autocomplete="off" required>
            <div class="suggestions-box custom-scroll"></div>
            <input type="hidden" class="real-item-code">

        <!-- 🔒 ชื่อสินค้า (Auto-fill) -->
        <div class="mb-4">
            <input type="text" class="part-name w-full bg-black/20 border border-[var(--glass-border)] rounded-xl p-3 text-xs text-[var(--text-main)] font-medium outline-none cursor-not-allowed opacity-70" data-i18n-placeholder="partNamePh" placeholder="ชื่อชิ้นงานจะแสดงอัตโนมัติ" readonly tabindex="-1">
        </div>

        <!-- 📱 Mobile Optimized Qty Inputs -->
        <div class="grid grid-cols-3 gap-2 mb-3">
            <div>
                <label class="block text-[10px] text-center font-bold text-[var(--text-sub)] mb-1 uppercase tracking-wider"><i class="fa-solid fa-bag-shopping text-amber-500 mr-1"></i> <span data-i18n="bag">ถุง</span></label>
                <input type="number" min="0" class="bag-qty w-full glass-input rounded-xl p-2.5 text-base text-center font-black outline-none" placeholder="0">
            </div>
            <div>
                <label class="block text-[10px] text-center font-bold text-[var(--text-sub)] mb-1 uppercase tracking-wider"><i class="fa-solid fa-box text-blue-400 mr-1"></i> <span data-i18n="pack">บรรจุ</span></label>
                <input type="number" min="0" class="pack-qty w-full glass-input rounded-xl p-2.5 text-base text-center font-black outline-none" placeholder="0">
            </div>
            <div>
                <label class="block text-[10px] text-center font-bold text-[var(--text-sub)] mb-1 uppercase tracking-wider"><i class="fa-solid fa-layer-group text-purple-400 mr-1"></i> <span data-i18n="fraction">เศษ</span></label>

function updateRowNumbers() {
    document.querySelectorAll(".item-row").forEach((row, i) => {
        row.querySelector(".row-number").textContent = "Item #" + (i + 1);
    });
}

/* =============================================================
   EVENT DELEGATION
============================================================= */
var container = document.getElementById("itemsContainer");

container.addEventListener("input", function(e) {
    if (e.target.classList.contains("item-search")) {
        let input = e.target;
        let val = input.value.trim().toUpperCase();
        let row = input.closest(".item-row");
        let box = row.querySelector(".suggestions-box");
        let hiddenInput = row.querySelector(".real-item-code");
        let nameInput = row.querySelector(".part-name");

        hiddenInput.value = ""; nameInput.value = "";
        input.classList.remove('border-emerald-400', 'text-emerald-500');

        if (val.length < 2) { box.style.display = "none"; return; }

        let matches = masterDataList.filter(item => 
            item.item_code.toUpperCase().includes(val) || 
            (item.code_name && item.code_name.toUpperCase().includes(val)) ||
            (item.cl && item.cl.toUpperCase().includes(val))
        ).slice(0, 10);

        if (matches.length > 0) {
            box.innerHTML = matches.map(item => `
                <div class="suggestion-item flex flex-col" data-code="${item.item_code}" data-name="${item.code_name}" data-cl="${item.cl}" data-pack="${item.pack_type}">
                    <span class="text-sm font-black text-[var(--text-main)]">${item.item_code}</span>
                    <span class="text-[10px] font-bold text-[var(--text-sub)]">ลูกค้า: <span class="text-sky-500">${item.cl}</span> | ${item.code_name}</span>
                </div>
            `).join("");
            box.style.display = "block";
        } else {
            box.innerHTML = `<div class="p-3 text-xs font-bold text-red-400 text-center bg-red-500/10 rounded-lg m-2">ไม่พบสินค้าในระบบ Database</div>`;
            box.style.display = "block";
        }
    }

    if (e.target.classList.contains("bag-qty") || e.target.classList.contains("pack-qty") || e.target.classList.contains("fraction-qty")) {
        let row = e.target.closest(".item-row");
        let bags = parseFloat(row.querySelector(".bag-qty").value) || 0;
        let pack = parseFloat(row.querySelector(".pack-qty").value) || 0;
        let frac = parseFloat(row.querySelector(".fraction-qty").value) || 0;
        row.querySelector(".total-qty").value = (bags * pack) + frac;
    }
});

container.addEventListener("click", function(e) {
    let suggestion = e.target.closest(".suggestion-item");
    if (suggestion) {
        let row = suggestion.closest(".item-row");
        let code = suggestion.getAttribute("data-code");
        let name = suggestion.getAttribute("data-name");
        let cl = suggestion.getAttribute("data-cl");
        let pack = suggestion.getAttribute("data-pack") || "";

        let searchInput = row.querySelector(".item-search");
        searchInput.value = code;
        searchInput.classList.add('border-emerald-400', 'text-emerald-500'); 
        row.querySelector(".real-item-code").value = code;
        row.querySelector(".part-name").value = `CL: ${cl} | ${name}`;
        
        let packInput = row.querySelector(".pack-qty");
        if(packInput.value === "") packInput.value = pack.replace(/[^0-9]/g, '');

        row.querySelector(".suggestions-box").style.display = "none";
    }

    let btn = e.target.closest("[data-action]");
    if (btn && btn.getAttribute("data-action") === "remove-row") {
        if (document.querySelectorAll(".item-row").length > 1) {
            deletePendingFiles(btn.closest(".item-row").getAttribute("data-row-uid"));
            btn.closest(".item-row").remove();
            updateRowNumbers();
        } else {
            alert("ต้องมีอย่างน้อย 1 รายการ");
        }
    }
    
    if (btn && btn.getAttribute("data-action") === "take-photo") {
        activePhotoRow = btn.closest(".item-row");
        let cam = document.getElementById("globalCameraInput");
        cam.value = ""; cam.click();
    }
});

document.addEventListener("click", function(e) {
    if (!e.target.closest(".relative")) {
        document.querySelectorAll(".suggestions-box").forEach(box => box.style.display = "none");
    }
});

/* =============================================================
   PENDING FILES STORE & CAMERA
============================================================= */
var pendingFiles = {};
function getPendingFiles(uid)    { return pendingFiles[uid] || []; }
function deletePendingFiles(uid) { delete pendingFiles[uid]; }
function clearAllPendingFiles()  { pendingFiles = {}; }
var activePhotoRow = null;

function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(event) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            var MAX_WIDTH = 1024, MAX_HEIGHT = 1024;
            var width = img.width, height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => { callback(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", { type: 'image/jpeg' })); }, 'image/jpeg', 0.7);
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById("globalCameraInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file || !activePhotoRow) return;
    var uid = activePhotoRow.getAttribute("data-row-uid");
    var capturedRow = activePhotoRow;
    activePhotoRow = null;

    compressImage(file, function(compressedFile) {
        if (!pendingFiles[uid]) pendingFiles[uid] = [];
        pendingFiles[uid].push(compressedFile);
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = document.createElement("img");
            img.src = ev.target.result;
            img.className = "photo-thumb";
            capturedRow.querySelector(".photo-strip").appendChild(img);
        };
        reader.readAsDataURL(compressedFile);
    });
});

async function uploadPhotos(uid, files, txnId) {
    if (!files.length) return { urls: [], failed: [] };
    var tasks = files.map(function(file, i) {
        var path = txnId + "/" + uid + "_" + i + ".jpg";
        return sbClient.storage.from("dispatch-photos").upload(path, file, { upsert: true }).then(r => {
            if (r.error) return { ok: false, name: file.name };
            return { ok: true, url: sbClient.storage.from("dispatch-photos").getPublicUrl(path).data.publicUrl };
        }).catch(() => ({ ok: false, name: file.name }));
    });
    var results = await Promise.all(tasks);
    return { urls: results.filter(r => r.ok).map(r => r.url), failed: results.filter(r => !r.ok).map(r => r.name) };
}

/* =============================================================
   SUBMIT FORM
============================================================= */
document.getElementById("dispatchForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    if (!sbClient) { alert("❌ ระบบฐานข้อมูลไม่พร้อมใช้งาน"); return; }

    let allValid = true;
    let rows = document.querySelectorAll(".item-row");
    rows.forEach(row => {
        if (row.querySelector(".real-item-code").value === "") {
            row.querySelector(".item-search").classList.add("border-red-500", "ring-2", "ring-red-500", "bg-red-500/10");
            allValid = false;
        }
    });

    if(!allValid) {
        alert("⚠️ กรุณาเลือกรายการสินค้าจากตัวเลือกที่ระบบค้นหาให้เท่านั้น!");
        return;
    }

    var btn = document.getElementById("submitBtn");
    var textEl = document.getElementById("submitText");
    var iconEl = document.getElementById("submitIcon");
    var origTxt = textEl.textContent;

    textEl.textContent = "กำลังบันทึก...";
    iconEl.className = "fa-solid fa-spinner fa-spin mr-2";
    btn.disabled = true;

    try {
        var now = new Date();
        var pad = n => ("0" + n).slice(-2);
        var txnId = "TXN-" + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + "-" + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

        var shiftText = document.getElementById("shift").value === "A" ? "Shift A" : "Shift B";
        var staffId = document.getElementById("staffId").value.trim().toUpperCase();

        textEl.textContent = "กำลังอัปโหลดรูป...";
        var uploadTasks = Array.from(rows).map(row => {
            var uid = row.getAttribute("data-row-uid");
            return uploadPhotos(uid, getPendingFiles(uid), txnId).then(res => ({ uid, urls: res.urls }));
        });
        var uploadResults = await Promise.all(uploadTasks);
        var photoUrlsMap = {};
        uploadResults.forEach(res => photoUrlsMap[res.uid] = res.urls);

        textEl.textContent = "กำลังบันทึกข้อมูล...";
        var r1 = await sbClient.from("bills").insert([{ bill_id: txnId, shift: shiftText, staff_id: staffId }]);
        if (r1.error) throw new Error("bills: " + r1.error.message);

        var items = [];
        rows.forEach(row => {
            var uid = row.getAttribute("data-row-uid");
            var itemCode = row.querySelector(".real-item-code").value; 
            var name = row.querySelector(".part-name").value; 
            var bag = Number(row.querySelector(".bag-qty").value) || 0;
            var pack = Number(row.querySelector(".pack-qty").value) || 0;
            var frac = Number(row.querySelector(".fraction-qty").value) || 0;
            
            items.push({
                bill_id: txnId,
                part_name: `${itemCode} (${name})`, 
                bag_qty: bag, pack_qty: pack, fraction_qty: frac,
                photo_urls: photoUrlsMap[uid] || []
            });
        });

        var r2 = await sbClient.from("bill_items").insert(items);
        if (r2.error) throw new Error("bill_items: " + r2.error.message);

        alert("✅ บันทึกสำเร็จ!\nรหัสอ้างอิง: " + txnId);
        clearAllPendingFiles();
        document.getElementById("itemsContainer").innerHTML = "";
        createRow();
        document.getElementById("shift").value = "A";

    } catch(err) {
        alert("❌ " + err.message);
        console.error(err);
    } finally {
        textEl.textContent = origTxt;
        iconEl.className = "fa-solid fa-cloud-arrow-up mr-2 text-lg";
        btn.disabled = false;
    }
});
