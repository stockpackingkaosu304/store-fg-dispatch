<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Store Layout - WMS [v1.1.2]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{
            --cell: 22px;      /* grid unit, matches 1 excel column/row */
            --cols: 47;
            --rows: 30;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }

        /* ===== Interactive boxes (A1-xx / A2-xx racks, Lift, Roll Container) — white, clickable ===== */
        .rack-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; line-height: 1.05; text-align: center;
            font-weight: 800; color: #0f172a;
            cursor: pointer; background-color: #ffffff;
            transition: all 0.15s ease; border: 1.5px solid #475569;
            box-sizing: border-box; position: relative; z-index: 5;
            padding: 1px; overflow: hidden;
        }
        .rack-box:hover { background-color: #38bdf8; color: white; z-index: 30; box-shadow: 0 0 10px #0ea5e9; }
        .rack-box.narrow-vert span { writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 0.02em; }
        .rack-box .box-icon { font-size: 12px; margin-bottom: 2px; }

        /* Cargo lift boxes — distinct color from plain white rack boxes */
        .rack-box.type-lift {
            background-color: #c4b5fd; color: #312e81; border-color: #7c3aed;
        }
        .rack-box.type-lift:hover { background-color: #a78bfa; color: white; box-shadow: 0 0 10px #7c3aed; }
        .rack-box.type-lift .box-icon { color: #4c1d95; font-size: 14px; }
        .rack-box.type-lift:hover .box-icon { color: white; }

        .status-empty { background-color: #4ade80 !important; color: #042f1a; }
        .status-partial { background-color: #facc15 !important; color: #422006; }
        .status-full { background-color: #f87171 !important; color: #4c0505; }
        .status-unknown { background-color: #e2e8f0; color: #64748b; }

        .highlight-blink {
            animation: blinker 0.8s linear infinite;
            background-color: #0ea5e9 !important; color: white !important;
            box-shadow: 0 0 20px #0ea5e9; z-index: 40 !important; border-color: #0284c7;
        }
        @keyframes blinker { 50% { opacity: 0.4; } }

        /* ===== Static zone / room / machine boxes (context only, from Excel) ===== */
        .zone-box {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size: 8.5px; line-height:1.1; font-weight:700; color:#94a3b8;
            background: rgba(51,65,85,0.55); border: 1px dashed #475569;
            box-sizing:border-box; padding:2px; overflow:hidden; border-radius:2px;
        }
        .toilet-box {
            display:flex; align-items:center; justify-content:center;
            font-size: 8.5px; font-weight:700; color:#94a3b8;
            background: rgba(30,41,59,0.9); border: 1px solid #334155; box-sizing:border-box;
        }
        .void-box {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size: 8.5px; font-weight:700; color:#334155;
            background: repeating-linear-gradient(45deg, rgba(51,65,85,0.15), rgba(51,65,85,0.15) 10px, transparent 10px, transparent 20px);
            border: 1px dashed #334155; box-sizing:border-box; border-radius:2px;
        }

        .building-position-wrapper{ position: relative; }
        .floor-badge-outside{
            position:absolute; left:2px; top:-30px; z-index:25;
            padding: 4px 12px; font-size:11px; font-weight:900; border-radius:8px;
            letter-spacing:.05em; white-space:nowrap; box-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        /* ===== 3D scene scaffolding ===== */
        .scene-container {
            perspective: 2300px; perspective-origin: 50% 50%;
            /* [Patch v1.1.2] บังคับขนาด Scene ให้เป๊ะตามตาราง เพื่อไม่ให้มันเด้งไปมา */
            width: calc(var(--cell) * var(--cols));
            height: calc(var(--cell) * var(--rows));
        }
        #scale-wrapper {
            transition: transform 0.3s ease;
        }
        .building-3d {
            position: relative; transform-style: preserve-3d;
            width: calc(var(--cell) * var(--cols));
            height: calc(var(--cell) * var(--rows));
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .floor-layer {
            position: absolute; top: 0; left: 0;
            width: calc(var(--cell) * var(--cols));
            height: calc(var(--cell) * var(--rows));
            background: rgba(30, 41, 59, 0.9);
            border: 3px solid #64748b;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--cell));
            grid-template-rows: repeat(var(--rows), var(--cell));
        }
        .floor-layer::before {
            content: ''; position: absolute; top: 100%; left: -3px; right: -3px; height: 20px;
            background: #0f172a; transform-origin: top; transform: rotateX(-90deg); border: 1px solid #334155;
        }
        .floor-layer::after {
            content: ''; position: absolute; top: -3px; bottom: -3px; right: -20px; width: 20px;
            background: #334155; transform-origin: left; transform: rotateY(90deg); border: 1px solid #1e293b;
        }

        .state-3d { transform: rotateX(42deg) rotateZ(-16deg) translateZ(0px) translateY(-20px); }
        .state-3d #floor1-layer { transform: translateZ(-110px); opacity: 1; }
        .state-3d #floor2-layer { transform: translateZ(200px); opacity: 1; }

        .state-f1 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f1 #floor1-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }
        .state-f1 #floor2-layer { transform: translateZ(500px); opacity: 0; pointer-events: none; }

        .state-f2 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f2 #floor1-layer { transform: translateZ(-500px); opacity: 0; pointer-events: none; }
        .state-f2 #floor2-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }

        /* [Patch v1.1.2] Custom Scrollbar ให้ดูสะอาดตาบน PC */
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>

        function iconFor(type){
            if(type === 'lift') return '<i class="fa-solid fa-truck-ramp-box box-icon"></i>';
            if(type === 'roll') return '<i class="fa-solid fa-dolly box-icon"></i>';
            return '';
        }

        function rackHtml(loc){
            const id = loc.id || loc.val;
            const widthCols = loc.c2 - loc.c1 + 1;
            const narrow = widthCols === 1 && loc.val.length >= 4;
            const typeClass = loc.type === 'lift' ? ' type-lift' : '';
            return `<div class="rack-box${narrow ? ' narrow-vert' : ''}${typeClass}" id="box-${id}"
                style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1};">${iconFor(loc.type)}<span>${loc.val}</span></div>`;
        }
        function otherHtml(loc){
            const cls = loc.type === 'toilet' ? 'toilet-box' : loc.type === 'void' ? 'void-box' : 'zone-box';
            const icon = loc.type === 'toilet' ? '<i class="fa-solid fa-restroom" style="font-size:10px;margin-right:2px;"></i>' : '';
            return `<div class="${cls}" style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1};">${icon}<span>${loc.val}</span></div>`;
        }
        function rackGroupHtml(loc){
            const inner = loc.items.map(it => {
                const narrow = it.val.length >= 4;
                return `<div class="rack-box${narrow ? ' narrow-vert' : ''}" id="box-${it.id}"><span>${it.val}</span></div>`;
            }).join('');
            return `<div style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1}; display:grid; grid-template-columns:repeat(${loc.items.length}, 1fr);">${inner}</div>`;
        }

        function renderFloor(containerId, data){
            const el = document.getElementById(containerId);
            let html = '';
            data.forEach(loc => {
                if(loc.type === 'rackgroup') html += rackGroupHtml(loc);
                else html += (loc.type === 'rack' || loc.type === 'lift' || loc.type === 'roll') ? rackHtml(loc) : otherHtml(loc);
            });
            el.innerHTML = html;
        }

        function resize3D() {
            const wrapper = document.getElementById('scale-wrapper');
            const spacer = document.getElementById('spacer');
            const cell = 22;
            const totalWidth = cell * 47;
            const totalHeight = cell * 30;
            const w = window.innerWidth;
            const isMobile = w < 768;

            let targetScale;
            if (isMobile) {
                targetScale = Math.max((w - 24) / totalWidth, 0.65);
                wrapper.style.transformOrigin = "top left";
                spacer.style.display = "block";
                spacer.style.width = `${totalWidth * targetScale + 40}px`;
                spacer.style.height = `${totalHeight * targetScale + 100}px`;
            } else {
                targetScale = (w - 24) / totalWidth;
                targetScale = Math.min(1.3, Math.max(targetScale, 0.48));
                wrapper.style.transformOrigin = "center center";
                spacer.style.display = "flex";
                spacer.style.width = "100%";
                spacer.style.height = "100%";
            }
            wrapper.style.transform = `scale(${targetScale})`;
        }
        window.addEventListener('resize', resize3D);

                    let mData = masterData[itemCode.toUpperCase()] || {};
                    let codeName = (mData.code_name || "").toUpperCase();
                    let cl = (mData.cl || "").toUpperCase();

                    return itemCode.toUpperCase().includes(term) || 
                           codeName.includes(term) || 
                           cl.includes(term) || 
                           locId.toUpperCase().includes(term);
                });

                // ถ้าเจออย่างน้อย 1 ชิ้น หรือค้นหาตรงกับรหัสช่อง (Location)
                if(matchedItems.length > 0 || locId.toUpperCase().includes(term)) {

                    // สั่งให้ช่องกะพริบ
                    boxIdsFor(locId).forEach(id => { 
                        const b = document.getElementById(id); 
                        if(b) b.classList.add('highlight-blink'); 
                    });

                    // 💡 แสดงผลเฉพาะรายการที่ตรงกับการค้นหา (เพื่อไม่ให้ตาลาย)
                    let itemsToDisplay = matchedItems.length > 0 ? matchedItems : iArr;

                    html += `
                    <div class="bg-slate-950 p-3 rounded border border-slate-700 hover:border-sky-500 cursor-pointer transition-colors shadow-md" onclick="openModal('${locId}')">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-sky-400 font-black text-sm tracking-wider"><i class="fa-solid fa-location-dot mr-1"></i> ${locId}</span>
                        </div>`;

                    itemsToDisplay.forEach((itemCode) => {
                        let mData = masterData[itemCode.toUpperCase()] || { code_name: '-', cl: '-', max_stack: '-', pack_type: '-', bag_color: '-' };

                        html += `
                        <div class="mb-2 pl-3 border-l-2 border-slate-600 space-y-1">
                            <div class="text-sm font-bold text-amber-400"><i class="fa-solid fa-tag text-xs"></i> ${t.labelCode}: ${mData.code_name} <span class="text-xs text-slate-400 ml-1">(${mData.cl})</span></div>
                            <div class="text-xs text-slate-300">ITEM: ${itemCode}</div>
                            <div class="text-[11px] text-slate-400 font-medium mt-1">
                                <span class="mr-3"><i class="fa-solid fa-layer-group text-slate-500"></i> ${t.labelMaxStack}: <span class="text-white">${mData.max_stack}</span></span>
                                <span><i class="fa-solid fa-box-open text-slate-500"></i> ${t.labelPack}: <span class="text-white">${mData.pack_type} ${mData.bag_color}</span></span>
                            </div>
                        </div>`;
                    });

                    html += `</div>`;
                    foundCount++;
                }
            }

            if(foundCount > 0) {
                content.innerHTML = html;
                panelTitle.innerHTML = `<i class="fa-solid fa-list-ul mr-1.5"></i> ${t.searchFoundPrefix} ${foundCount} ${t.searchFoundSuffix}`;
                panel.classList.remove('hidden');
            } else {
                content.innerHTML = `<div class="text-center text-slate-500 py-6 text-sm"><i class="fa-solid fa-magnifying-glass-minus text-2xl mb-2 block"></i>${t.searchNotFoundDesc}</div>`;
                panelTitle.innerHTML = `<i class="fa-solid fa-list-ul mr-1.5"></i> ${t.searchNotFoundTitle}`;
                panel.classList.remove('hidden');
            }
        });

        // --- อัปเกรดหน้าต่าง Modal (ตอนคลิกแผนผัง) ---
        function openModal(locId) {
            const t = translations[currentLang] || translations.th;
            document.getElementById('modalTitle').innerText = locId;
            const data = locationData[locId] || { status: 'ไม่มีข้อมูล', items_list: '' };
            const badge = document.getElementById('modalStatusBadge');

            badge.innerText = data.status === 'Empty' ? t.statusEmpty : data.status === 'Partial' ? t.statusPartial : data.status === 'Full' ? t.statusFull : t.statusUnknown;
            badge.className = "px-3 py-1 rounded-full text-sm font-bold uppercase border " + 
                (data.status === 'Empty' ? "bg-green-950 text-green-400 border-green-800" : 
                 data.status === 'Partial' ? "bg-yellow-950 text-yellow-400 border-yellow-800" : 
                 data.status === 'Full' ? "bg-red-950 text-red-400 border-red-800" : 
                 "bg-slate-800 text-slate-400 border-slate-700");

            let iArr = (data.items_list || "").split(',').map(s=>s.trim()).filter(s=>s!=="");

            if (iArr.length === 0) {
                document.getElementById('modalBodyContent').innerHTML = `<div class="text-center text-slate-500 py-8"><i class="fa-solid fa-box-open text-4xl mb-3 block text-slate-600"></i><span class="text-sm">${t.modalNoData}</span></div>`;
            } else {
                let html = '<div class="space-y-3 max-h-[300px] overflow-y-auto pr-2 hide-scroll">';
                for (let i = 0; i < iArr.length; i++) {
                    let itemCode = iArr[i].toUpperCase();
                    // 💡 ดึงข้อมูลจาก Master Data มาแสดง
                    let mData = masterData[itemCode] || { code_name: t.modalNotFound, cl: '-', max_stack: '-', pack_type: '-', bag_color: '-' };

                    html += `
                    <div class="bg-slate-900 p-3.5 rounded-lg border border-slate-700 flex items-start gap-3 shadow-md">
                        <div class="bg-sky-950 text-sky-400 rounded-lg p-2.5 mt-1 border border-sky-900/50"><i class="fa-solid fa-box text-base"></i></div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-base font-black text-amber-400 truncate">${mData.code_name}</span>
                                <span class="text-xs font-bold text-slate-400 bg-slate-800 px-2 py-0.5 rounded">${t.labelCustomer}: ${mData.cl}</span>
                            </div>
                            <div class="text-xs text-slate-300 font-mono mb-2 truncate">${itemCode}</div>

                            <div class="grid grid-cols-2 gap-2 text-[11px] font-medium text-slate-400 bg-slate-950 p-2 rounded border border-slate-800">
                                <div><i class="fa-solid fa-layer-group text-slate-500 mr-1"></i> ${t.labelMax}: <span class="text-white">${mData.max_stack}</span></div>
                                <div><i class="fa-solid fa-box-open text-slate-500 mr-1"></i> ${t.labelPack}: <span class="text-white">${mData.pack_type} ${mData.bag_color}</span></div>
                            </div>
                        </div>
                    </div>`;
                }
                html += '</div>';
                document.getElementById('modalBodyContent').innerHTML = html;
            }
            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal(e) { document.getElementById('infoModal').classList.remove('active'); }
        // 💡 เปลี่ยนจาก fetchLocations เป็น fetchAllData
        document.addEventListener("DOMContentLoaded", () => { initLayout(); resize3D(); fetchAllData(); changeLanguage(currentLang); });
    </script>

    let currentLang = localStorage.getItem('wms_lang') || 'th';

    function changeLanguage(lang) {
        if (!translations[lang]) return;
        currentLang = lang;
        localStorage.setItem('wms_lang', lang);

        document.querySelectorAll('#globalLangSwitcher').forEach(s => s.value = lang);

        const t = translations[lang];
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (t[key] !== undefined) el.textContent = t[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
            const key = el.getAttribute("data-i18n-placeholder");
            if (t[key] !== undefined) el.setAttribute("placeholder", t[key]);
        });
