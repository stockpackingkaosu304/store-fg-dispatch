<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Layout - WMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        
        /* สไตล์สำหรับช่องเก็บของ */
        .rack-box {
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
            height: 40px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .rack-box:hover { transform: scale(1.05); border-color: #94a3b8; z-index: 10; }
        
        /* สไตล์สีตามสถานะ */
        .status-empty { background-color: #bbf7d0; border-color: #4ade80; } /* เขียว */
        .status-partial { background-color: #fef08a; border-color: #facc15; } /* เหลือง */
        .status-full { background-color: #fecaca; border-color: #f87171; color: #7f1d1d; } /* แดง */
        .status-unknown { background-color: #f1f5f9; } /* สีเทา (ยังไม่มีข้อมูลในระบบ) */

        /* อนิเมชันไฟกะพริบตอนค้นหา */
        .highlight-blink {
            animation: blinker 1s linear infinite;
            border: 3px solid #0ea5e9 !important;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.6);
        }
        @keyframes blinker { 50% { opacity: 0.5; transform: scale(1.1); } }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 50; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="sticky top-0 bg-slate-800 text-white p-4 shadow-lg z-40">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="menu.html" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg text-sm transition-colors">
                    <i class="fa-solid fa-chevron-left mr-1"></i> เมนูหลัก
                </a>
                <h1 class="text-lg font-bold"><i class="fa-solid fa-map-location-dot text-sky-400 mr-2"></i>ผังคลังสินค้า</h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="ค้นหารหัสสินค้า, ชื่อชิ้นงาน หรือ รหัสช่อง..." 
                    class="w-full bg-slate-900 border border-slate-600 rounded-full py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-sky-500">
            </div>
        </div>
    </div>

    <div class="bg-white border-b py-2 px-4 text-xs flex justify-center gap-4 text-slate-600 font-medium">
        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-300"></span> ว่าง (Empty)</div>
        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-300"></span> กลาง (Partial)</div>
        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-300"></span> เต็ม (Full)</div>
    </div>

    <div class="flex-1 p-4 overflow-x-hidden">
        <div class="max-w-6xl mx-auto space-y-8">
            
            <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-slate-800 border-b pb-2 mb-4">ชั้น 1 (Zone 1ST)</h2>
                
                <div class="flex gap-4 mb-4">
                    <div class="bg-slate-200 text-slate-500 w-24 h-16 rounded flex items-center justify-center text-xs font-bold uppercase tracking-wider">Office</div>
                    <div class="bg-slate-200 text-slate-500 w-24 h-16 rounded flex flex-col items-center justify-center text-xs font-bold uppercase tracking-wider"><i class="fa-solid fa-elevator text-lg"></i> Lift</div>
                </div>

                <div id="grid-a1" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-10 gap-2">
                    </div>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-slate-800 border-b pb-2 mb-4">ชั้น 2 (Zone 2ST)</h2>
                
                <div class="flex gap-4 mb-4">
                    <div class="bg-slate-200 text-slate-500 w-32 h-16 rounded flex items-center justify-center text-xs font-bold uppercase tracking-wider"><i class="fa-solid fa-users mr-2"></i> Staff Room</div>
                </div>

                <div id="grid-a2" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-12 gap-2">
                    </div>
            </div>

        </div>
    </div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="bg-white rounded-2xl p-6 w-11/12 max-w-sm shadow-2xl m-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold text-slate-800">A1-00</h3>
                <span id="modalStatusBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase">Status</span>
            </div>
            
            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 mb-4">
                <p class="text-xs text-slate-500 font-semibold mb-1 uppercase tracking-wider"><i class="fa-solid fa-barcode mr-1"></i> รหัสสินค้า (Item Code):</p>
                <div id="modalItems" class="text-sm font-mono text-sky-700 font-bold break-words mb-3">
                    ไม่มีข้อมูลสินค้า
                </div>
                
                <p class="text-xs text-slate-500 font-semibold mb-1 uppercase tracking-wider"><i class="fa-solid fa-tag mr-1"></i> ชื่อชิ้นงาน (Part Name):</p>
                <div id="modalPartNames" class="text-sm text-slate-700 break-words">
                    -
                </div>
            </div>

            <button onclick="closeModal(event)" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-xl transition-colors">
                ปิดหน้าต่าง
            </button>
        </div>
    </div>

    <script>
        /* ตั้งค่า Supabase */
        const SB_URL = "https://suardrnsfpdqwcgupqkb.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YXJkcm5zZnBkcXdjZ3VwcWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTY1NjAsImV4cCI6MjA5ODAzMjU2MH0.-ooHJb_YXCpNgxkiGRlt6M1-A1iPTJFNYlPLFsfOzQI";
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

        let locationData = {}; // เก็บข้อมูลจาก Database

        // 1. ฟังก์ชันสร้างกล่องสี่เหลี่ยมตามจำนวนช่อง
        function renderGrid(prefix, count, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            for(let i = 1; i <= count; i++) {
                let id = prefix + "-" + (i < 10 ? "0" + i : i);
                let div = document.createElement("div");
                div.className = "rack-box status-unknown"; // ค่าเริ่มต้นเป็นสีเทา (ไม่มีข้อมูล)
                div.id = "box-" + id;
                div.innerText = id;
                div.onclick = () => openModal(id);
                container.appendChild(div);
            }
        }

        // 2. ดึงข้อมูลจากฐานข้อมูลมาลงสี
        async function fetchLocations() {
            const { data, error } = await sbClient.from("locations").select("*");
            if(error) { console.error("Error fetching locations:", error); return; }

            // แปลงข้อมูลให้อยู่ในรูปแบบ Object เพื่อให้ค้นหาง่าย
            data.forEach(loc => {
                locationData[loc.location_id] = loc;
                
                // หา DOM ของกล่องนี้ แล้วระบายสี
                const box = document.getElementById("box-" + loc.location_id);
                if(box) {
                    box.className = "rack-box"; // ล้างคลาสเก่า
                    if(loc.status === 'Empty') box.classList.add('status-empty');
                    else if(loc.status === 'Partial') box.classList.add('status-partial');
                    else if(loc.status === 'Full') box.classList.add('status-full');
                    else box.classList.add('status-unknown');
                }
            });
        }

        // 3. ระบบค้นหาปุ๊บ ไฟกะพริบปั๊บ (ค้นหาด้วย ID, รหัสสินค้า, หรือ ชื่อชิ้นงาน)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.trim().toUpperCase();
            
            // ล้างไฟกะพริบเก่าออกให้หมดก่อน
            document.querySelectorAll('.highlight-blink').forEach(el => el.classList.remove('highlight-blink'));
            if(!term) return;

            // ค้นหาใน locationData
            for(const [locId, data] of Object.entries(locationData)) {
                const items = (data.items_list || "").toUpperCase();
                const parts = (data.part_names || "").toUpperCase();
                
                // ถ้าคำค้นหาตรงกับอันใดอันหนึ่ง ให้ไฟกะพริบ
                if(locId.includes(term) || items.includes(term) || parts.includes(term)) {
                    const box = document.getElementById("box-" + locId);
                    if(box) box.classList.add('highlight-blink');
                }
            }
        });

        // 4. ระบบแสดง Modal (หน้าต่างเด้ง) พร้อมชื่อชิ้นงาน
        function openModal(locId) {
            document.getElementById('modalTitle').innerText = locId;
            const data = locationData[locId] || { status: 'Unknown', items_list: 'ไม่มีข้อมูลในระบบ', part_names: '-' };
            
            const badge = document.getElementById('modalStatusBadge');
            badge.innerText = data.status;
            badge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase ";
            if(data.status === 'Empty') badge.className += "bg-green-100 text-green-700";
            else if(data.status === 'Partial') badge.className += "bg-yellow-100 text-yellow-700";
            else if(data.status === 'Full') badge.className += "bg-red-100 text-red-700";
            else badge.className += "bg-slate-200 text-slate-600";

            document.getElementById('modalItems').innerText = data.items_list || "-";
            document.getElementById('modalPartNames').innerText = data.part_names || "-";
            
            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal(e) {
            document.getElementById('infoModal').classList.remove('active');
        }

        // เริ่มการทำงานเมื่อหน้าเว็บโหลดเสร็จ
        document.addEventListener("DOMContentLoaded", () => {
            renderGrid("A1", 29, "grid-a1"); // ชั้น 1 มี 29 ช่อง
            renderGrid("A2", 64, "grid-a2"); // ชั้น 2 มี 64 ช่อง
            fetchLocations(); // ดึงข้อมูลมาระบายสี
        });
    </script>
</body>
</html>
