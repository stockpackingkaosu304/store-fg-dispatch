<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Store Layout - WMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{
            --cell: 22px;      /* grid unit, matches 1 excel column/row */
            --cols: 47;
            --rows: 30;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }

        /* ===== Interactive boxes (A1-xx / A2-xx racks, Lift, Roll Container) — white, clickable ===== */
        .rack-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; line-height: 1.05; text-align: center;
            font-weight: 800; color: #0f172a;
            cursor: pointer; background-color: #ffffff;
            transition: all 0.15s ease; border: 1.5px solid #475569;
            box-sizing: border-box; position: relative; z-index: 5;
            padding: 1px; overflow: hidden;
        }
        .rack-box:hover { background-color: #38bdf8; color: white; z-index: 30; box-shadow: 0 0 10px #0ea5e9; }
        .rack-box.narrow-vert span { writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 0.02em; }
        .rack-box .box-icon { font-size: 12px; margin-bottom: 2px; }

        /* Cargo lift boxes — distinct color from plain white rack boxes */
        .rack-box.type-lift {
            background-color: #c4b5fd; color: #312e81; border-color: #7c3aed;
        }
        .rack-box.type-lift:hover { background-color: #a78bfa; color: white; box-shadow: 0 0 10px #7c3aed; }
        .rack-box.type-lift .box-icon { color: #4c1d95; font-size: 14px; }
        .rack-box.type-lift:hover .box-icon { color: white; }

        .status-empty { background-color: #4ade80 !important; color: #042f1a; }
        .status-partial { background-color: #facc15 !important; color: #422006; }
        .status-full { background-color: #f87171 !important; color: #4c0505; }
        .status-unknown { background-color: #e2e8f0; color: #64748b; }

        .highlight-blink {
            animation: blinker 0.8s linear infinite;
            background-color: #0ea5e9 !important; color: white !important;
            box-shadow: 0 0 20px #0ea5e9; z-index: 40 !important; border-color: #0284c7;
        }
        @keyframes blinker { 50% { opacity: 0.4; } }

        /* ===== Static zone / room / machine boxes (context only, from Excel) ===== */
        .zone-box {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size: 8.5px; line-height:1.1; font-weight:700; color:#94a3b8;
            background: rgba(51,65,85,0.55); border: 1px dashed #475569;
            box-sizing:border-box; padding:2px; overflow:hidden; border-radius:2px;
        }
        .toilet-box {
            display:flex; align-items:center; justify-content:center;
            font-size: 8.5px; font-weight:700; color:#94a3b8;
            background: rgba(30,41,59,0.9); border: 1px solid #334155; box-sizing:border-box;
        }
        .void-box {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size: 8.5px; font-weight:700; color:#334155;
            background: repeating-linear-gradient(45deg, rgba(51,65,85,0.15), rgba(51,65,85,0.15) 10px, transparent 10px, transparent 20px);
            border: 1px dashed #334155; box-sizing:border-box; border-radius:2px;
        }
        /* floor badge — sits OUTSIDE the plan frame entirely, above the top-left corner, clear of the Cargo Lift */
        .building-position-wrapper{ position: relative; }
        .floor-badge-outside{
            position:absolute; left:2px; top:-30px; z-index:25;
            padding: 4px 12px; font-size:11px; font-weight:900; border-radius:8px;
            letter-spacing:.05em; white-space:nowrap; box-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        /* ===== 3D scene scaffolding ===== */
     .scene-container {
    perspective: 2300px; perspective-origin: 50% 50%;
    width: 100%; min-height: 74vh; display: flex; align-items: center; justify-content: center;
    padding: 2.75rem 0.5rem 1.5rem;
}
        #scale-wrapper {
            transition: transform 0.3s ease; transform-origin: center center;
            display: flex; align-items: center; justify-content: center;
        }
        .building-3d {
            position: relative; transform-style: preserve-3d;
            width: calc(var(--cell) * var(--cols));
            height: calc(var(--cell) * var(--rows));
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .floor-layer {
            position: absolute; top: 0; left: 0;
            width: calc(var(--cell) * var(--cols));
            height: calc(var(--cell) * var(--rows));
            background: rgba(30, 41, 59, 0.9);
            border: 3px solid #64748b;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--cell));
            grid-template-rows: repeat(var(--rows), var(--cell));
        }
        .floor-layer::before {
            content: ''; position: absolute; top: 100%; left: -3px; right: -3px; height: 20px;
            background: #0f172a; transform-origin: top; transform: rotateX(-90deg); border: 1px solid #334155;
        }
        .floor-layer::after {
            content: ''; position: absolute; top: -3px; bottom: -3px; right: -20px; width: 20px;
            background: #334155; transform-origin: left; transform: rotateY(90deg); border: 1px solid #1e293b;
        }

        .state-3d { transform: rotateX(42deg) rotateZ(-16deg) translateZ(0px) translateY(-20px); }
        .state-3d #floor1-layer { transform: translateZ(-110px); opacity: 1; }
        .state-3d #floor2-layer { transform: translateZ(200px); opacity: 1; }

        .state-f1 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f1 #floor1-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }
        .state-f1 #floor2-layer { transform: translateZ(500px); opacity: 0; pointer-events: none; }

        .state-f2 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f2 #floor1-layer { transform: translateZ(-500px); opacity: 0; pointer-events: none; }
        .state-f2 #floor2-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col select-none">

    <div class="sticky top-0 bg-slate-900 text-white p-3 shadow-2xl z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="menu.html" class="bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-sm border border-slate-700">
                    <i class="fa-solid fa-house mr-1"></i> เมนูหลัก
                </a>
                <h1 class="text-base font-black tracking-wider"><i class="fa-solid fa-cubes text-sky-400 mr-2"></i>WMS 3D STORE</h1>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="ค้นหารหัสสินค้า, ชื่อ, รหัสช่อง (เช่น A1-05, A2-30)..."
                    class="w-full bg-slate-950 border border-slate-700 rounded-full py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-sky-500">
            </div>
        </div>
    </div>

    <div class="bg-slate-950 border-b border-slate-800 p-2 flex justify-center gap-2 shadow-inner flex-wrap">
        <button onclick="changeView('3d')" id="btn-3d" class="bg-sky-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow transition-all">
            <i class="fa-solid fa-layer-group"></i> ดูภาพรวม 3D
        </button>
        <button onclick="changeView('f1')" id="btn-f1" class="bg-slate-800 text-slate-400 text-xs font-bold px-4 py-2 rounded-lg shadow transition-all">
            <i class="fa-solid fa-arrow-down"></i> โฟกัส ชั้น 1
        </button>
        <button onclick="changeView('f2')" id="btn-f2" class="bg-slate-800 text-slate-400 text-xs font-bold px-4 py-2 rounded-lg shadow transition-all">
            <i class="fa-solid fa-arrow-up"></i> โฟกัส ชั้น 2
        </button>
    </div>

    <div class="bg-slate-900 py-2 px-4 text-[11px] flex justify-center gap-5 text-slate-400 font-bold border-b border-slate-800/50 flex-wrap">
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-green-400 shadow"></span> ว่าง (Empty)</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-yellow-400 shadow"></span> มีบางส่วน (Partial)</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-400 shadow"></span> เต็ม (Full)</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm bg-white border border-slate-500"></span> จุดวางสินค้า: A1/A2/Roll Container (คลิกได้)</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#c4b5fd;border:1px solid #7c3aed;"></span> ลิฟต์ขนของ (คลิกได้)</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm bg-slate-600 border border-dashed border-slate-400"></span> พื้นที่/เครื่องจักร (อ้างอิงจากผัง)</div>
    </div>

    <div class="flex-1 w-full flex items-center justify-center">
    <div class="scene-container">
            <div id="scale-wrapper">
                <div class="building-position-wrapper">
                    <div id="floorBadge" class="floor-badge-outside bg-sky-900 text-sky-300 border border-sky-500">ภาพรวม 3 มิติ (ชั้น 1-2)</div>
                    <div id="building" class="building-3d state-3d">
                        <div id="floor1-layer" class="floor-layer"></div>
                        <div id="floor2-layer" class="floor-layer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-11/12 max-w-sm shadow-2xl m-auto text-slate-100" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="text-2xl font-black text-white tracking-wider">A1-00</h3>
                <span id="modalStatusBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase border border-slate-600">Status</span>
            </div>
            <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 mb-5 min-h-[120px]" id="modalBodyContent"></div>
            <button onclick="closeModal(event)" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">ปิดหน้าต่าง</button>
        </div>
    </div>

        function iconFor(type){
            if(type === 'lift') return '<i class="fa-solid fa-truck-ramp-box box-icon"></i>';
            if(type === 'roll') return '<i class="fa-solid fa-dolly box-icon"></i>';
            return '';
        }

        function rackHtml(loc){
            const id = loc.id || loc.val;
            const widthCols = loc.c2 - loc.c1 + 1;
            const narrow = widthCols === 1 && loc.val.length >= 4;
            const typeClass = loc.type === 'lift' ? ' type-lift' : '';
            return `<div class="rack-box${narrow ? ' narrow-vert' : ''}${typeClass}" id="box-${id}"
                style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1};">${iconFor(loc.type)}<span>${loc.val}</span></div>`;
        }
        function otherHtml(loc){
            const cls = loc.type === 'toilet' ? 'toilet-box' : loc.type === 'void' ? 'void-box' : 'zone-box';
            const icon = loc.type === 'toilet' ? '<i class="fa-solid fa-restroom" style="font-size:10px;margin-right:2px;"></i>' : '';
            return `<div class="${cls}" style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1};">${icon}<span>${loc.val}</span></div>`;
        }
        // rackgroup: evenly divides an exact column span into N equal racks (used where the real
        // room width doesn't divide evenly into whole Excel columns, e.g. A2-55..A2-60 on floor 2 —
        // this keeps every box the same size while A2-55's right edge still lines up with the
        // STAFFROOM/1ST void's right edge below it).
        function rackGroupHtml(loc){
            const inner = loc.items.map(it => {
                const narrow = it.val.length >= 4;
                return `<div class="rack-box${narrow ? ' narrow-vert' : ''}" id="box-${it.id}"><span>${it.val}</span></div>`;
            }).join('');
            return `<div style="grid-column:${loc.c1} / ${loc.c2+1}; grid-row:${loc.r1} / ${loc.r2+1}; display:grid; grid-template-columns:repeat(${loc.items.length}, 1fr);">${inner}</div>`;
        }

        function renderFloor(containerId, data, floorLabel, floorColorClass){
            const el = document.getElementById(containerId);
            let html = '';
            data.forEach(loc => {
                if(loc.type === 'rackgroup') html += rackGroupHtml(loc);
                else html += (loc.type === 'rack' || loc.type === 'lift' || loc.type === 'roll') ? rackHtml(loc) : otherHtml(loc);
            });
            el.innerHTML = html;
        }

            renderFloor('floor1-layer', FLOOR1_DATA, '1ST FLOOR', 'bg-sky-900 text-sky-300 border border-sky-500');
            renderFloor('floor2-layer', FLOOR2_DATA, '2ND FLOOR', 'bg-amber-900 text-amber-300 border border-amber-500');
        }

        function resize3D() {
            const wrapper = document.getElementById('scale-wrapper');
            const cell = 22;
            const totalWidth = cell * 47;
            const w = window.innerWidth;
            const targetScale = (w - 24) / totalWidth;
            wrapper.style.transform = `scale(${Math.min(1.3, Math.max(targetScale, 0.48))})`;
        }

        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);
        let locationData = {};

        async function fetchLocations() {
            const { data, error } = await sbClient.from("locations").select("*");
            if(error) return;
            data.forEach(loc => {
                locationData[loc.location_id] = loc;
                const box = document.getElementById("box-" + loc.location_id);
                if(box) {
                    box.onclick = () => openModal(loc.location_id);
                    if(loc.status === 'Empty') box.classList.add('status-empty');
                    else if(loc.status === 'Partial') box.classList.add('status-partial');
                    else if(loc.status === 'Full') box.classList.add('status-full');
                    else box.classList.add('status-unknown');
                }
            });
            // จุดที่ยังไม่มีข้อมูลใน Supabase (เช่น ลิฟต์/Roll Container ที่ยังไม่เคยบันทึก) ให้คลิกดูได้เช่นกัน (แสดงว่า "ไม่มีข้อมูล")
            document.querySelectorAll('.rack-box').forEach(box => {
                if(!box.onclick){
                    const id = box.id.replace('box-','');
                    box.onclick = () => openModal(id);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.trim().toUpperCase();
            document.querySelectorAll('.highlight-blink').forEach(el => el.classList.remove('highlight-blink'));
            if(!term) return;
            for(const [locId, data] of Object.entries(locationData)) {
                if(locId.includes(term) || (data.items_list||"").toUpperCase().includes(term) || (data.part_names||"").toUpperCase().includes(term)) {
                    const b = document.getElementById("box-" + locId);
                    if(b) b.classList.add('highlight-blink');
                }
            }
        });

        function openModal(locId) {
            document.getElementById('modalTitle').innerText = locId;
            const data = locationData[locId] || { status: 'ไม่มีข้อมูล', items_list: '', part_names: '' };
            const badge = document.getElementById('modalStatusBadge');
            badge.innerText = data.status === 'Empty' ? 'ว่าง (Empty)' : data.status === 'Partial' ? 'กลาง (Partial)' : data.status === 'Full' ? 'เต็ม (Full)' : 'ไม่มีข้อมูล';
            badge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase border " + (data.status === 'Empty' ? "bg-green-950 text-green-400 border-green-800" : data.status === 'Partial' ? "bg-yellow-950 text-yellow-400 border-yellow-800" : data.status === 'Full' ? "bg-red-950 text-red-400 border-red-800" : "bg-slate-800 text-slate-400 border-slate-700");

            let iArr = (data.items_list || "").split(',').map(s=>s.trim()).filter(s=>s!=="");
            let pArr = (data.part_names || "").split(',').map(s=>s.trim()).filter(s=>s!=="");

            document.getElementById('modalBodyContent').innerHTML = iArr.length === 0
                ? `<div class="text-center text-slate-500 py-6"><i class="fa-solid fa-box-open text-3xl mb-2 block text-slate-600"></i> ไม่มีสินค้าในช่องนี้</div>`
                : '<div class="space-y-2.5 max-h-[250px] overflow-y-auto pr-1 hide-scroll">' + iArr.map((item, i) => `<div class="bg-slate-900 p-2.5 rounded-lg border border-slate-800 flex items-start gap-3 shadow-md"><div class="bg-sky-950 text-sky-400 rounded-md p-2 mt-0.5 border border-sky-900/50"><i class="fa-solid fa-box text-xs"></i></div><div class="flex-1 min-w-0"><div class="text-[9px] text-slate-400 font-bold uppercase tracking-wide"><i class="fa-solid fa-barcode"></i> ${item||'-'}</div><div class="text-xs font-bold text-white break-words mt-0.5">${pArr[i]||'-'}</div></div></div>`).join('') + '</div>';
            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal(e) { document.getElementById('infoModal').classList.remove('active'); }
