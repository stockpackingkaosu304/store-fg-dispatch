<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Store Layout - WMS (Pixel-Perfect from Excel)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }

        /* ===== Rack boxes (คลิกได้ ผูกกับ Supabase) ===== */
        .rack-box {
            position: absolute; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; color: #0f172a;
            cursor: pointer; background-color: #ffffff;
            transition: all 0.15s ease; border: 1px solid #475569;
            box-sizing: border-box; text-align: center; line-height: 1.05; padding: 1px;
            overflow: hidden;
        }
        .rack-box:hover { background-color: #38bdf8; color: white; z-index: 30; box-shadow: 0 0 10px #0ea5e9; }

        .status-empty   { background-color: #4ade80 !important; color: #042f1a; }
        .status-partial { background-color: #facc15 !important; color: #422006; }
        .status-full    { background-color: #f87171 !important; color: #4c0505; }
        .status-unknown { background-color: #e2e8f0; color: #64748b; }

        .highlight-blink {
            animation: blinker 0.8s linear infinite;
            background-color: #0ea5e9 !important; color: white !important;
            box-shadow: 0 0 20px #0ea5e9; z-index: 40; border-color: #0284c7;
        }
        @keyframes blinker { 50% { opacity: 0.4; transform: scale(1.08); } }

        /* ===== Zone boxes (ไม่คลิก - อ้างอิงจากผังโรงงานใน Excel) ===== */
        .zone-box {
            position: absolute; box-sizing: border-box; display: flex; align-items: center; justify-content: center;
            text-align: center; overflow: hidden; border-radius: 3px; font-weight: 700;
            padding: 2px; line-height: 1.15;
        }
        .zone-lift    { background: repeating-linear-gradient(45deg, rgba(20,184,166,.25), rgba(20,184,166,.25) 8px, rgba(13,148,136,.15) 8px, rgba(13,148,136,.15) 16px); border: 2px dashed #2dd4bf; color: #5eead4; font-size: 0.6rem; box-shadow: 0 0 12px rgba(45,212,191,.35); }
        .zone-machine { background: rgba(129,140,248,.18); border: 1px solid #818cf8; color: #c7d2fe; font-size: 0.55rem; }
        .zone-oven    { background: rgba(251,146,60,.18); border: 1px solid #fb923c; color: #fed7aa; font-size: 0.58rem; }
        .zone-auto    { background: rgba(244,114,182,.18); border: 1px solid #f472b6; color: #fbcfe8; font-size: 0.58rem; }
        .zone-packing { background: rgba(250,204,21,.12); border: 1px dashed #eab308; color: #fde68a; font-size: 0.6rem; }
        .zone-process { background: rgba(56,189,248,.14); border: 1px solid #38bdf8; color: #bae6fd; font-size: 0.6rem; }
        .zone-office  { background: rgba(100,116,139,.35); border: 1px solid #64748b; color: #e2e8f0; font-size: 0.65rem; }
        .zone-staff   { background: rgba(217,119,6,.18); border: 1px solid #d97706; color: #fed7aa; font-size: 1.1rem; letter-spacing: .1em; }
        .zone-toilet  { background: rgba(148,163,184,.15); border: 1px solid #94a3b8; color: #cbd5e1; font-size: 0.55rem; }
        .zone-spine   { background: rgba(2,132,199,.15); border: 1px solid #0284c7; color: #7dd3fc; font-size: 0.85rem; letter-spacing: .3em; writing-mode: vertical-rl; font-weight: 900; }
        .zone-void    { background: rgba(15,23,42,.4); border: 2px dashed #334155; color: #475569; font-size: 0.6rem; flex-direction: column; gap: 2px; }
        .zone-other   { background: rgba(71,85,105,.2); border: 1px solid #475569; color: #cbd5e1; font-size: 0.6rem; }

        .aisle-hint { position: absolute; pointer-events: none; opacity: .5; }

        /* ===== 3D scene ===== */
        .scene-container {
           .scene-container {
    perspective: 2000px; /* ลดจาก 3200px */
    perspective-origin: 50% 20%;
    width: 100%; min-height: 82vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 0; overflow: hidden;
}
        #scale-wrapper {
            transition: transform 0.3s ease; transform-origin: center center;
            display: flex; align-items: center; justify-content: center;
        }

        /* ขนาดตึก = ขนาดจริงจาก Excel เป๊ะๆ ทั้งกว้างและสูง (เท่ากันทั้ง 2 ชั้น) */
        .building-3d {
            position: relative; transform-style: preserve-3d;
            width: var(--bw); height: var(--bh);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .floor-layer {
            position: absolute; top: 0; left: 0;
            width: var(--bw); height: var(--bh);
            background: rgba(30, 41, 59, 0.88);
            border: 2px solid #64748b;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .floor-layer::before {
            content: ''; position: absolute; top: 100%; left: -2px; right: -2px; height: 20px;
            background: #0f172a; transform-origin: top; transform: rotateX(-90deg); border: 1px solid #334155;
        }
        .floor-layer::after {
            content: ''; position: absolute; top: -2px; bottom: -2px; right: -20px; width: 20px;
            background: #334155; transform-origin: left; transform: rotateY(90deg); border: 1px solid #1e293b;
        }

        .state-3d { transform: rotateX(58deg) rotateZ(-28deg) translateZ(150px); }
        .state-3d #floor1-layer { transform: translateZ(0px); opacity: 1; }
        .state-3d #floor2-layer { transform: translateZ(320px); opacity: 1; }

        .state-f1 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f1 #floor1-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }
        .state-f1 #floor2-layer { transform: translateZ(600px); opacity: 0; pointer-events: none; }

        .state-f2 { transform: rotateX(0deg) rotateZ(0deg) translateZ(0px); }
        .state-f2 #floor1-layer { transform: translateZ(-600px); opacity: 0; pointer-events: none; }
        .state-f2 #floor2-layer { transform: translateZ(0px); opacity: 1; z-index: 10; background: rgba(15, 23, 42, 1); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col select-none">

    <div class="sticky top-0 bg-slate-900 text-white p-3 shadow-2xl z-50 border-b border-slate-800">

            </div>

    </div>

            <i class="fa-solid fa-layer-group"></i> ดูภาพรวม 3D
        </button>
        <button onclick="changeView('f1')" id="btn-f1" class="bg-slate-800 text-slate-400 text-xs font-bold px-4 py-2 rounded-lg shadow transition-all">

        </button>
        <button onclick="changeView('f2')" id="btn-f2" class="bg-slate-800 text-slate-400 text-xs font-bold px-4 py-2 rounded-lg shadow transition-all">
            <i class="fa-solid fa-arrow-up"></i> โฟกัส ชั้น 2
        </button>
        <div class="flex items-center gap-2 ml-2 text-[10px] text-slate-400 flex-wrap justify-center">
            <span><span class="legend-dot" style="background:#4ade80"></span>ว่าง</span>
            <span><span class="legend-dot" style="background:#facc15"></span>กลาง</span>
            <span><span class="legend-dot" style="background:#f87171"></span>เต็ม</span>
            <span><span class="legend-dot" style="background:#818cf8"></span>เครื่องจักร</span>
            <span><span class="legend-dot" style="background:#fb923c"></span>เตาอบ</span>
            <span><span class="legend-dot" style="background:#2dd4bf"></span>ลิฟต์</span>
        </div>
    </div>

    <div class="flex-1 overflow-hidden w-full bg-slate-950 flex items-center justify-center">
        <div class="scene-container">
            <div id="scale-wrapper">
                <div id="building" class="building-3d state-3d">
                    <div id="floor1-layer" class="floor-layer">
                        <div class="absolute left-[20px] top-[-15px] bg-sky-900 px-4 py-1 text-sm font-black text-sky-300 rounded-t-lg border-2 border-b-0 border-sky-500 z-20">1ST FLOOR</div>
                    </div>
                    <div id="floor2-layer" class="floor-layer">
                        <div class="absolute left-[20px] top-[-15px] bg-amber-900 px-4 py-1 text-sm font-black text-amber-300 rounded-t-lg border-2 border-b-0 border-amber-500 z-20">2ND FLOOR</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-11/12 max-w-sm shadow-2xl m-auto text-slate-100" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="text-2xl font-black text-white tracking-wider">A1-00</h3>
                <span id="modalStatusBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase border border-slate-600">Status</span>
            </div>
            <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 mb-5 min-h-[120px]" id="modalBodyContent"></div>
            <button onclick="closeModal(event)" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">ปิดหน้าต่าง</button>
        </div>
    </div>

            if (error) return;
            data.forEach(loc => {
                locationData[loc.location_id] = loc;
                boxIdsFor(loc.location_id).forEach(id => {
                    const box = document.getElementById(id);
                    if (box) {
                        box.classList.remove('status-unknown', 'status-empty', 'status-partial', 'status-full');
                        if (loc.status === 'Empty') box.classList.add('status-empty');
                        else if (loc.status === 'Partial') box.classList.add('status-partial');
                        else if (loc.status === 'Full') box.classList.add('status-full');
                        else box.classList.add('status-unknown');
                    }
                });
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.trim().toUpperCase();
            document.querySelectorAll('.highlight-blink').forEach(el => el.classList.remove('highlight-blink'));
            if (!term) return;
            for (const [locId, data] of Object.entries(locationData)) {
                if (locId.includes(term) || (data.items_list||"").toUpperCase().includes(term) || (data.part_names||"").toUpperCase().includes(term)) {
                    boxIdsFor(locId).forEach(id => { const b = document.getElementById(id); if (b) b.classList.add('highlight-blink'); });
                }
            }
        });

        function openModal(locId) {
            document.getElementById('modalTitle').innerText = locId;
            const data = locationData[locId] || { status: 'ไม่มีข้อมูล', items_list: '', part_names: '' };
            const badge = document.getElementById('modalStatusBadge');
            badge.innerText = data.status === 'Empty' ? 'ว่าง (Empty)' : data.status === 'Partial' ? 'กลาง (Partial)' : data.status === 'Full' ? 'เต็ม (Full)' : 'ไม่มีข้อมูล';
            badge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase border " + (data.status === 'Empty' ? "bg-green-950 text-green-400 border-green-800" : data.status === 'Partial' ? "bg-yellow-950 text-yellow-400 border-yellow-800" : data.status === 'Full' ? "bg-red-950 text-red-400 border-red-800" : "bg-slate-800 text-slate-400 border-slate-700");

            let iArr = (data.items_list || "").split(',').map(s=>s.trim()).filter(s=>s!=="");
            let pArr = (data.part_names || "").split(',').map(s=>s.trim()).filter(s=>s!=="");

            document.getElementById('modalBodyContent').innerHTML = iArr.length === 0
                ? `<div class="text-center text-slate-500 py-6"><i class="fa-solid fa-box-open text-3xl mb-2 block text-slate-600"></i> ไม่มีสินค้าในช่องนี้</div>`
                : '<div class="space-y-2.5 max-h-[250px] overflow-y-auto pr-1 hide-scroll">' + iArr.map((item, i) => `<div class="bg-slate-900 p-2.5 rounded-lg border border-slate-800 flex items-start gap-3 shadow-md"><div class="bg-sky-950 text-sky-400 rounded-md p-2 mt-0.5 border border-sky-900/50"><i class="fa-solid fa-box text-xs"></i></div><div class="flex-1 min-w-0"><div class="text-[9px] text-slate-400 font-bold uppercase tracking-wide"><i class="fa-solid fa-barcode"></i> ${item||'-'}</div><div class="text-xs font-bold text-white break-words mt-0.5">${pArr[i]||'-'}</div></div></div>`).join('') + '</div>';
            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal(e) { document.getElementById('infoModal').classList.remove('active'); }
        document.addEventListener("DOMContentLoaded", () => { initLayout(); resize3D(); fetchLocations(); });
    </script>
</body>
</html>
