<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Main Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-slate-800 p-8 text-center text-white relative">
           <!-- 🟢 ปุ่มสลับภาษา -->
            <div class="absolute top-4 right-4 flex items-center gap-1.5 bg-slate-800/90 backdrop-blur-sm border border-slate-600 rounded-lg px-2 py-1 shadow-md z-[60] hover:border-sky-400 transition-colors">
                <i class="fa-solid fa-earth-asia text-sky-400 text-sm"></i>
                <select id="globalLangSwitcher" onchange="changeLanguage(this.value)"
                    class="bg-transparent text-white text-xs font-bold outline-none cursor-pointer appearance-none text-center pr-1 tracking-wider">
                    <option value="th" class="bg-slate-800 text-white">🇹🇭 TH</option>
                    <option value="zh" class="bg-slate-800 text-white">🇹🇼 ZH</option>
                    <option value="mm" class="bg-slate-800 text-white">🇲🇲 MM</option>
                    <option value="en" class="bg-slate-800 text-white">🇬🇧 EN</option>
                </select>
                <i class="fa-solid fa-chevron-down text-slate-400 text-[9px] pointer-events-none ml-1"></i>
            </div>
            <!-- 🟢 จบปุ่มสลับภาษา -->
            <div class="inline-block bg-sky-500 p-4 rounded-full mb-4 shadow-lg shadow-sky-500/30">
                <i class="fa-solid fa-boxes-stacked text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider mb-1" data-i18n="appTitle">STORE FG DISPATCH</h1>
            <p class="text-slate-400 text-sm" data-i18n="appDesc">ระบบจัดการคลังสินค้าและจ่ายงาน</p>
        </div>

        <div class="p-6 space-y-4">

            <button onclick="goToLayout()" class="w-full group relative bg-white border-2 border-slate-200 hover:border-sky-500 rounded-2xl p-4 flex items-center gap-4 transition-all hover:shadow-md text-left">
                <div class="bg-sky-50 group-hover:bg-sky-500 text-sky-500 group-hover:text-white w-14 h-14 rounded-xl flex items-center justify-center text-2xl transition-colors">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-slate-800" data-i18n="menuLayout">แผนผังคลังสินค้า</h2>
                    <p class="text-xs text-slate-500" data-i18n="menuLayoutDesc">ดูตำแหน่งสินค้า และสถานะพื้นที่ว่าง (Layout)</p>
                </div>
                <i class="fa-solid fa-chevron-right absolute right-6 text-slate-300 group-hover:text-sky-500 transition-colors"></i>
            </button>

         <button onclick="openLoginModal('index.html')" class="w-full group relative bg-white border-2 border-slate-200 hover:border-emerald-500 rounded-2xl p-4 flex items-center gap-4 transition-all hover:shadow-md text-left">
                <div class="bg-emerald-50 group-hover:bg-emerald-500 text-emerald-500 group-hover:text-white w-14 h-14 rounded-xl flex items-center justify-center text-2xl transition-colors">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-slate-800" data-i18n="menuDispatch">บันทึกจ่ายงาน</h2>
                    <p class="text-xs text-slate-500" data-i18n="menuDispatchDesc">บันทึกการเบิกจ่ายสินค้า (Dispatch)</p>
                </div>
                <i class="fa-solid fa-lock absolute right-6 text-slate-300 group-hover:text-emerald-500 transition-colors"></i>
            </button>

            <div class="pt-4 text-center">
                <button onclick="openLoginModal('report.html')" class="text-xs font-semibold text-slate-400 hover:text-sky-600 transition-colors cursor-pointer bg-transparent border-none">

    <div id="loginModal" class="modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl transform transition-all m-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-800">
                    <i class="fa-solid fa-id-card text-emerald-500 mr-2"></i><span data-i18n="loginTitle">ยืนยันตัวตน</span>
                </h3>
                <button onclick="closeLoginModal()" class="text-slate-400 hover:text-red-500">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <p id="loginModalDesc" class="text-sm text-slate-500 mb-4" data-i18n="loginDescDispatch">กรุณากรอกรหัสพนักงาน (Staff ID) ของคุณก่อนเข้าใช้งานระบบบันทึกจ่ายงาน</p>

            <input type="text" id="staffIdInput" data-i18n-placeholder="staffIdPh" placeholder="เช่น EMP001" class="w-full border border-gray-300 rounded-xl p-3 text-center text-lg uppercase tracking-widest font-bold focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none mb-2">

            <p id="loginError" class="hidden text-xs text-red-500 font-semibold mb-3 text-center"></p>

            <button id="loginConfirmBtn" onclick="confirmLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                <span id="loginConfirmBtnText" data-i18n="btnLogin">เข้าสู่ระบบจ่ายงาน</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let targetPage = ""; // ตัวแปรเก็บว่าพนักงานกดไปหน้าไหน
        let modalDescKey = "loginDescDispatch"; // คีย์คำอธิบายที่ใช้ใน modal ปัจจุบัน (สำหรับสลับภาษาตอน modal เปิดอยู่)

        /* =============================================================
           SUPABASE INIT
        ============================================================= */
        var sbClient = null;
        try {
            var SB_URL = "https://suardrnsfpdqwcgupqkb.supabase.co";
            var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YXJkcm5zZnBkcXdjZ3VwcWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTY1NjAsImV4cCI6MjA5ODAzMjU2MH0.-ooHJb_YXCpNgxkiGRlt6M1-A1iPTJFNYlPLFsfOzQI";
            sbClient = window.supabase.createClient(SB_URL, SB_KEY);
        } catch(e) {
            console.error("Supabase init error:", e);
        }

        function goToLayout() {
            window.location.href = "layout.html";
        }

        function openLoginModal(page) {
            targetPage = page;
            modalDescKey = (page === 'report.html') ? 'loginDescReport' : 'loginDescDispatch';

            var desc = document.getElementById('loginModalDesc');
            desc.setAttribute('data-i18n', modalDescKey);
            var t = translations[currentLang] || translations.th;
            desc.textContent = t[modalDescKey];

            hideLoginError();
            document.getElementById('loginModal').classList.add('active');

            const savedStaffId = localStorage.getItem("savedStaffId");
            if (savedStaffId) {
                document.getElementById('staffIdInput').value = savedStaffId;
            }
            document.getElementById('staffIdInput').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            hideLoginError();
        }

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideLoginError() {
            document.getElementById('loginError').classList.add('hidden');
        }

        function setLoginLoading(loading) {
            var btn     = document.getElementById('loginConfirmBtn');
            var btnText = document.getElementById('loginConfirmBtnText');
            var t = translations[currentLang] || translations.th;
            btn.disabled = loading;
            btnText.textContent = loading ? t.btnLoginLoading : t.btnLogin;
        }

        async function confirmLogin() {
            hideLoginError();
            var t = translations[currentLang] || translations.th;
            const staffId = document.getElementById('staffIdInput').value.trim().toUpperCase();
            if (!staffId) {
                showLoginError(t.errStaffRequired);
                return;
            }

            if (!sbClient) {
                showLoginError(t.errSystemNotReady);
                return;
            }

            setLoginLoading(true);

            try {
                const { data, error } = await sbClient
                    .from('staff')
                    .select('staff_id, role, active')
                    .eq('staff_id', staffId)
                    .maybeSingle();

                if (error) {
                    console.error(error);
                    showLoginError(t.errGeneral);
                    return;
                }

                if (!data || !data.active) {
                    showLoginError(t.errInvalid);
                    return;
                }

                if (targetPage === 'report.html' && data.role !== 'supervisor') {
                    showLoginError(t.errReportOnly);
                    return;
                }

                localStorage.setItem("savedStaffId", staffId);
                window.location.href = targetPage;

            } catch (err) {
                console.error(err);
                showLoginError(t.errGeneral);
            } finally {
                setLoginLoading(false);
            }
        }

        document.getElementById("staffIdInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                confirmLogin();
            }
        });
    </script>

    let currentLang = localStorage.getItem('wms_lang') || 'th';

    function changeLanguage(lang) {
        if (!translations[lang]) return;
        currentLang = lang;
        localStorage.setItem('wms_lang', lang);

        document.querySelectorAll('#globalLangSwitcher').forEach(s => s.value = lang);

        const t = translations[lang];
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (t[key] !== undefined) el.textContent = t[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
            const key = el.getAttribute("data-i18n-placeholder");
            if (t[key] !== undefined) el.setAttribute("placeholder", t[key]);
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        changeLanguage(currentLang);
    });

</body>
