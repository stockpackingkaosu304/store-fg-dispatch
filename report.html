<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Report Dashboard - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 🎨 Theme Engine Variables (ซิงค์กับหน้า Index/Menu) */
        :root {
            --bg-gradient: linear-gradient(-45deg, #f8fafc, #e2e8f0, #cbd5e1, #f1f5f9);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --glow-color: rgba(14, 165, 233, 0.15);
            --card-hover: rgba(255,255,255,0.9);
            --table-hover: rgba(14, 165, 233, 0.05);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0f172a);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --glow-color: rgba(56, 189, 248, 0.15);
            --card-hover: rgba(51, 65, 85, 0.8);
            --table-hover: rgba(255, 255, 255, 0.05);
        }

        [data-theme="kaosu"] {
            --bg-gradient: linear-gradient(-45deg, #450a0a, #7f1d1d, #220303, #450a0a);
            --glass-bg: rgba(69, 10, 10, 0.6);
            --glass-border: rgba(250, 204, 21, 0.2);
            --input-bg: rgba(0, 0, 0, 0.2);
            --text-main: #fef08a; 
            --text-sub: #fca5a5;
            --glow-color: rgba(250, 204, 21, 0.15);
            --card-hover: rgba(127, 29, 29, 0.8);
            --table-hover: rgba(250, 204, 21, 0.05);
        }

        body {
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.5s ease;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Custom Scrollbar สำหรับตารางแนวนอนบน PC */
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

        /* Glassmorphism Styles */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .glass-input { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); backdrop-filter: blur(8px); transition: all 0.3s ease; }
        .glass-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        
        .mouse-glow { position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--glow-color) 0%, transparent 60%); pointer-events: none; z-index: 0; transition: width 0.2s, height 0.2s; }

        .photo-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid var(--glass-border); transition: 0.2s; }
        .photo-thumb:hover { transform: scale(1.15) translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); z-index: 10; position: relative; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0; transform:scale(0.95)} to{opacity:1; transform:scale(1)} }

        /* ปรับแต่ง Table UI ให้ดูแพง */
        table { border-collapse: separate; border-spacing: 0; }
        th { background: var(--input-bg); backdrop-filter: blur(10px); }
        tr { border-bottom: 1px solid var(--glass-border); transition: all 0.2s ease; }
        tr:hover td { background: var(--table-hover); }
        td { border-bottom: 1px solid var(--glass-border); }
        tr:last-child td { border-bottom: none; }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6 relative" data-theme="dark">

<div class="mouse-glow"></div>

<!-- Image Modal -->
<div id="imgModal" class="modal-overlay" onclick="closeModal()">
    <img id="modalImg" class="max-w-[90vw] max-h-[90vh] rounded-2xl shadow-2xl border border-[var(--glass-border)]" src="" alt="photo">
</div>

<!-- Floating Top Controls -->
<div class="fixed top-4 right-4 z-[60] flex gap-2">
    <!-- Language Switcher -->
    <div class="glass-panel rounded-full px-3 py-1.5 flex items-center gap-1.5 shadow-md">
        <i class="fa-solid fa-earth-asia text-sky-400 text-xs"></i>
        <select id="globalLangSwitcher" onchange="changeLanguage(this.value)" class="bg-transparent text-[var(--text-main)] text-[11px] font-bold outline-none cursor-pointer appearance-none text-center pr-1 tracking-wider">
            <option value="th" class="bg-slate-800 text-white">🇹🇭 TH</option>
            <option value="zh" class="bg-slate-800 text-white">🇹🇼 ZH</option>
            <option value="mm" class="bg-slate-800 text-white">🇲🇲 MM</option>
            <option value="en" class="bg-slate-800 text-white">🇬🇧 EN</option>
        </select>
    </div>
</div>

<div class="max-w-7xl mx-auto space-y-6 relative z-10 pt-10 md:pt-0">

    <!-- Header Glass -->
    <div class="glass-panel p-6 md:p-8 rounded-3xl relative overflow-hidden shadow-xl">
        <!-- Decoration Blur -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-sky-500/20 rounded-full blur-3xl pointer-events-none"></div>

        <div class="flex items-center gap-4 mb-6">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-sky-400 to-blue-600 flex items-center justify-center shadow-lg shadow-sky-500/30 shrink-0">
                <i class="fa-solid fa-chart-pie text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-[var(--text-main)] tracking-wider" data-i18n="appTitle">DISPATCH REPORT</h1>
                <p class="text-xs font-bold text-[var(--text-sub)] tracking-widest uppercase mt-1" data-i18n="appDesc">Analytics Dashboard</p>
            </div>
        </div>

        <div class="flex gap-3 mt-2">
            <a href="menu.html" class="flex-1 glass-input hover:bg-[var(--card-hover)] text-center text-[11px] md:text-xs font-bold py-3 rounded-xl transition-all"><i class="fa-solid fa-house mr-1"></i> <span data-i18n="navMenu">หน้าหลัก</span></a>
            <a href="index.html" class="flex-1 glass-input hover:bg-[var(--card-hover)] text-center text-[11px] md:text-xs font-bold py-3 rounded-xl transition-all"><i class="fa-solid fa-barcode mr-1"></i> <span data-i18n="navDispatch">จ่ายงาน</span></a>
            <a href="report.html" class="flex-1 bg-gradient-to-r from-sky-500 to-blue-600 text-white text-center text-[11px] md:text-xs font-bold py-3 rounded-xl shadow-lg shadow-sky-500/30 transition-all"><i class="fa-solid fa-chart-pie mr-1"></i> <span data-i18n="navReport">รายงาน</span></a>
        </div>
    </div>

    <!-- Summary Cards (Premium Layout) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="glass-panel rounded-3xl p-5 relative overflow-hidden group">
            <i class="fa-solid fa-file-invoice absolute -right-4 -bottom-4 text-6xl text-[var(--text-main)] opacity-5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold text-[var(--text-sub)] uppercase tracking-widest mb-1 relative z-10" data-i18n="summaryBillsLabel">บิลทั้งหมด</p>
            <p id="summaryBills" class="text-3xl font-black text-sky-400 drop-shadow-md relative z-10">—</p>
        </div>
        <div class="glass-panel rounded-3xl p-5 relative overflow-hidden group">
            <i class="fa-solid fa-boxes-packing absolute -right-4 -bottom-4 text-6xl text-[var(--text-main)] opacity-5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold text-[var(--text-sub)] uppercase tracking-widest mb-1 relative z-10" data-i18n="summaryItemsLabel">รายการสินค้า</p>
            <p id="summaryItems" class="text-3xl font-black text-emerald-400 drop-shadow-md relative z-10">—</p>
        </div>
        <div class="glass-panel rounded-3xl p-5 relative overflow-hidden group">
            <i class="fa-solid fa-cubes absolute -right-4 -bottom-4 text-6xl text-[var(--text-main)] opacity-5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold text-[var(--text-sub)] uppercase tracking-widest mb-1 relative z-10" data-i18n="summaryTotalLabel">ยอดรวมทั้งหมด</p>
            <p id="summaryTotal" class="text-3xl font-black text-amber-400 drop-shadow-md relative z-10">—</p>
        </div>
        <div class="glass-panel rounded-3xl p-5 relative overflow-hidden group">
            <i class="fa-solid fa-users absolute -right-4 -bottom-4 text-6xl text-[var(--text-main)] opacity-5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold text-[var(--text-sub)] uppercase tracking-widest mb-1 relative z-10" data-i18n="summaryStaffLabel">พนักงาน</p>
            <p id="summaryStaff" class="text-3xl font-black text-purple-400 drop-shadow-md relative z-10">—</p>
        </div>
    </div>

    <!-- Filter & Tools Glass -->
    <div class="glass-panel rounded-3xl p-6 shadow-md">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h3 class="text-sm font-black text-[var(--text-main)] uppercase tracking-wider flex items-center gap-2">
                <div class="bg-sky-500/20 text-sky-400 p-2 rounded-xl"><i class="fa-solid fa-filter"></i></div>
                <span data-i18n="filterTitle">ตัวกรองข้อมูล</span>
            </h3>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <button onclick="clearFilter()" class="flex-1 md:flex-none glass-input hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/50 text-xs px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95"><i class="fa-solid fa-rotate-right mr-1"></i><span data-i18n="quickClear">ล้าง</span></button>
                <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white text-xs px-6 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 transition-all active:scale-95"><i class="fa-solid fa-file-excel"></i> <span data-i18n="btnExport">Export</span></button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-4">
            <div class="col-span-2 md:col-span-1">
                <label class="block text-[10px] font-bold text-[var(--text-sub)] uppercase mb-2 ml-1 tracking-widest" data-i18n="filterStartDate">เริ่มต้น</label>
                <input type="date" id="startDate" class="w-full glass-input rounded-xl p-3 text-sm outline-none font-medium">
            </div>
            <div class="col-span-2 md:col-span-1">
                <label class="block text-[10px] font-bold text-[var(--text-sub)] uppercase mb-2 ml-1 tracking-widest" data-i18n="filterEndDate">สิ้นสุด</label>
                <input type="date" id="endDate" class="w-full glass-input rounded-xl p-3 text-sm outline-none font-medium">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-[var(--text-sub)] uppercase mb-2 ml-1 tracking-widest" data-i18n="filterStaffId">รหัสพนักงาน</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-sub)] text-xs"></i>
                    <input type="text" id="staffFilter" class="w-full glass-input rounded-xl p-3 pl-8 text-sm outline-none uppercase font-bold" placeholder="EMP001">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-[var(--text-sub)] uppercase mb-2 ml-1 tracking-widest" data-i18n="filterShift">กะ</label>
                <select id="shiftFilter" class="w-full glass-input rounded-xl p-3 text-sm font-bold outline-none cursor-pointer">
                    <option value="" class="text-slate-800" data-i18n="filterShiftAll">ทั้งหมด</option>
                    <option value="Shift A" class="text-slate-800">Shift A</option>
                    <option value="Shift B" class="text-slate-800">Shift B</option>
                </select>
            </div>
            <div class="col-span-2 md:col-span-1 flex items-end">
                <button onclick="fetchReport()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl text-sm shadow-md shadow-sky-500/20 transition-all active:scale-95"><i class="fa-solid fa-magnifying-glass mr-1"></i> <span data-i18n="btnSearch">ค้นหา</span></button>
            </div>
        </div>
    </div>

    <!-- Data Table Glass -->
    <div class="glass-panel rounded-3xl overflow-hidden shadow-lg relative min-h-[200px]">
        
        <!-- Loading State -->
        <div id="loadingState" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[var(--glass-bg)] backdrop-blur-sm hidden">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-sky-400 mb-3"></i>
            <p class="text-xs font-bold text-[var(--text-sub)] tracking-widest" data-i18n="loadingText">LOADING DATA...</p>
        </div>

        <div class="overflow-x-auto custom-scroll p-1">
            <table class="w-full text-sm text-left whitespace-nowrap min-w-[800px]">
                <thead>
                    <tr>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider rounded-tl-2xl" data-i18n="thDateTime">เวลา</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider" data-i18n="thStaffId">พนักงาน</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider" data-i18n="thShift">กะ</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider" data-i18n="thBillId">บิล</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider" data-i18n="thPartName">รายการ</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider text-center" data-i18n="total">รวม</th>
                        <th class="p-4 text-[10px] font-black text-[var(--text-sub)] uppercase tracking-wider rounded-tr-2xl" data-i18n="thPhotos">รูป</th>
                    </tr>
                </thead>
                <tbody id="reportBody" class="text-[var(--text-main)]">
                    <!-- Data injects here -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
/* =============================================================
   🎨 Theme & Glow Logic
============================================================= */
document.addEventListener('mousemove', (e) => { 
    document.documentElement.style.setProperty('--x', e.clientX + 'px'); 
    document.documentElement.style.setProperty('--y', e.clientY + 'px'); 
});
document.body.setAttribute('data-theme', localStorage.getItem('wms_theme') || 'dark');

// ==========================================
// 🚀 ฐานข้อมูล และ Logic
// ==========================================
var sbClient = window.supabase.createClient("https://suardrnsfpdqwcgupqkb.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1YXJkcm5zZnBkcXdjZ3VwcWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTY1NjAsImV4cCI6MjA5ODAzMjU2MH0.-ooHJb_YXCpNgxkiGRlt6M1-A1iPTJFNYlPLFsfOzQI");
var currentData = [];

function showLoading(show) {
    const el = document.getElementById("loadingState");
    if(show) el.classList.remove("hidden");
    else setTimeout(() => el.classList.add("hidden"), 300); // Smooth hide
}

async function fetchReport() {
    showLoading(true);
    var start = document.getElementById("startDate").value;
    var end = document.getElementById("endDate").value;
    var staff = document.getElementById("staffFilter").value.trim().toUpperCase();
    var shift = document.getElementById("shiftFilter").value;
    
    var query = sbClient.from("full_dispatch_report").select("*");
    if(start) query = query.gte("created_at", start + "T00:00:00"); 
    if(end) query = query.lte("created_at", end + "T23:59:59");
    if(staff) query = query.eq("staff_id", staff); 
    if(shift) query = query.eq("shift", shift);
    
    try {
        var res = await query.order("created_at", { ascending: false });
        currentData = res.data || []; 
        renderTable(currentData);
    } catch (e) {
        console.error(e);
        alert("เกิดข้อผิดพลาดในการโหลดข้อมูล");
        showLoading(false);
    }
}

function renderTable(data) {
    var tbody = document.getElementById("reportBody"); 
    tbody.innerHTML = "";
    var bills = {}, total = 0;
    
    if(!data.length) { 
        tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center text-[var(--text-sub)]"><div class="flex flex-col items-center justify-center opacity-60"><i class="fa-solid fa-box-open text-5xl mb-4"></i><span class="text-sm font-bold tracking-widest">ไม่พบข้อมูลในช่วงเวลานี้</span></div></td></tr>`; 
    }
    
    data.forEach(row => {
        bills[row.bill_id] = true; 
        total += (row.bag_qty * row.pack_qty) + row.fraction_qty;
        var tr = document.createElement("tr"); 
        
        let shiftBadge = row.shift === 'Shift A' 
            ? `<span class="bg-amber-500/20 text-amber-500 border border-amber-500/30 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider">${row.shift}</span>`
            : `<span class="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider">${row.shift}</span>`;

        tr.innerHTML = `
            <td class="p-4 text-[11px] font-medium text-[var(--text-sub)]">${new Date(row.created_at).toLocaleString('th-TH')}</td>
            <td class="p-4 font-black tracking-wider text-[var(--text-main)]">${row.staff_id}</td>
            <td class="p-4">${shiftBadge}</td>
            <td class="p-4 font-mono text-[10px] font-bold text-[var(--text-sub)]">${row.bill_id}</td>
            <td class="p-4 text-xs font-bold leading-relaxed text-[var(--text-main)]">${row.part_name}</td>
            <td class="p-4 text-center font-black text-emerald-400 text-lg bg-emerald-500/5 rounded-xl border border-emerald-500/10 my-2">${(row.bag_qty * row.pack_qty) + row.fraction_qty}</td>
            <td class="p-4">
                ${row.photo_urls?.[0] ? `<div class="flex gap-1.5">${row.photo_urls.map(url=>`<img src="${url}" class="photo-thumb" onclick="openModal('${url}')">`).join('')}</div>` : '<span class="text-[var(--text-sub)] text-[10px] font-bold bg-black/20 px-2 py-1 rounded-md">ไม่มีรูป</span>'}
            </td>`;
        tbody.appendChild(tr);
    });
    
    document.getElementById("summaryBills").textContent = Object.keys(bills).length; 
    document.getElementById("summaryItems").textContent = data.length; 
    document.getElementById("summaryTotal").textContent = total.toLocaleString(); 
    document.getElementById("summaryStaff").textContent = new Set(data.map(d => d.staff_id)).size;
    showLoading(false);
}

function exportToExcel() {
    if(currentData.length === 0) return alert("ไม่มีข้อมูลให้ Export");
    var ws = XLSX.utils.json_to_sheet(currentData.map(r=>({
        "วันที่/เวลา": new Date(r.created_at).toLocaleString("th-TH"),
        "รหัสบิล": r.bill_id,
        "รหัสพนักงาน": r.staff_id,
        "กะ": r.shift,
        "รายการสินค้า": r.part_name,
        "จำนวนถุง": r.bag_qty,
        "บรรจุ": r.pack_qty,
        "เศษ": r.fraction_qty,
        "ยอดรวม": (r.bag_qty*r.pack_qty)+r.fraction_qty
    })));
    var wb = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(wb, ws, "Report"); 
    XLSX.writeFile(wb, "Kaosu_Dispatch_Report.xlsx");
}

function clearFilter() { 
    document.getElementById("staffFilter").value=""; 
    document.getElementById("shiftFilter").value=""; 
    
    var today = new Date(); var pad = n => ("0"+n).slice(-2); 
    var dStr = today.getFullYear()+"-"+pad(today.getMonth()+1)+"-"+pad(today.getDate()); 
    document.getElementById("startDate").value=dStr; 
    document.getElementById("endDate").value=dStr; 

    fetchReport(); 
}

function openModal(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('imgModal').classList.add('active');
}
function closeModal() {
    document.getElementById('imgModal').classList.remove('active');
    setTimeout(() => document.getElementById('modalImg').src = "", 300);
}

// ==========================================
// 🌍 ระบบแปลภาษา 4 ชาติ

const translations = {

function changeLanguage(lang) { 
    localStorage.setItem('wms_lang', lang); 
    document.querySelectorAll('#globalLangSwitcher').forEach(s => s.value = lang); 
    const t = translations[lang]||translations['th']; 
    document.querySelectorAll("[data-i18n]").forEach(el => { if(t[el.getAttribute("data-i18n")]) el.textContent = t[el.getAttribute("data-i18n")]; }); 
}

document.addEventListener("DOMContentLoaded", () => { 
    clearFilter(); // Sets today's date and fetches
    changeLanguage(localStorage.getItem('wms_lang') || 'th'); 
});
